  display:flex;align-items:center;gap:14px;
  padding:14px 18px;background:#f9f9f9;border:1px solid #eee;border-radius:12px;
}
.contact-icon{font-size:22px}
.contact-label{font-size:13px;color:#888;margin-bottom:2px}
.contact-email{font-size:14px;font-weight:600;color:var(--red);text-decoration:none}
.contact-email:hover{text-decoration:underline}
.contributors-block{margin-bottom:4px}
.contrib-role{
  font-size:11px;font-weight:700;letter-spacing:.08em;color:#999;
  text-transform:uppercase;margin:12px 0 4px;
}
.contrib-names{font-size:14px;color:#222;line-height:1.8}
.thanks-cards{display:flex;gap:10px;flex-wrap:wrap}
.thanks-card{
  display:flex;align-items:center;gap:8px;
  padding:10px 18px;background:#f9f9f9;border:1px solid #eee;border-radius:10px;
  font-size:14px;font-weight:600;color:#222;white-space:nowrap;
}
.thanks-card img{height:24px;width:auto}

/* ── Bookmarks Page ──────────────────────────────── */
.bookmarks-layout{display:flex;gap:24px;padding:0 0 40px}
.bookmarks-sidebar{
  width:220px;flex-shrink:0;position:sticky;top:20px;align-self:flex-start;
}
.bookmarks-sidebar .folder-list{
  background:var(--card);border-radius:14px;overflow:hidden;border:1px solid rgba(0,0,0,.06);
}
.bookmarks-sidebar .folder-item{
  display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
  cursor:pointer;transition:background .15s;font-size:14px;border-bottom:1px solid rgba(0,0,0,.04);
}
.bookmarks-sidebar .folder-item:last-child{border-bottom:none}
.bookmarks-sidebar .folder-item:hover{background:rgba(0,0,0,.03)}
.bookmarks-sidebar .folder-item.active{background:var(--accent);color:#fff;font-weight:600}
.bookmarks-sidebar .folder-item.active .folder-count{color:rgba(255,255,255,.8)}
.folder-count{font-size:12px;color:var(--muted);margin-left:8px;flex-shrink:0}
.folder-actions{display:flex;gap:4px;margin-left:auto;flex-shrink:0;opacity:0;transition:opacity .15s}
.folder-item:hover .folder-actions{opacity:1}
.folder-actions button{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;color:var(--muted)}
.folder-actions button:hover{background:rgba(0,0,0,.08);color:var(--text)}
.folder-item.active .folder-actions button{color:rgba(255,255,255,.7)}
.folder-item.active .folder-actions button:hover{color:#fff;background:rgba(255,255,255,.15)}
.add-folder-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;
  cursor:pointer;font-size:13px;color:var(--accent);background:var(--card);
  border-radius:14px;border:1px dashed var(--accent);margin-top:10px;transition:background .15s;
}
.add-folder-btn:hover{background:rgba(99,102,241,.06)}
.bookmarks-main{flex:1;min-width:0}
.bookmark-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:16px;
}
.bookmark-card{
  background:var(--card);border-radius:14px;overflow:hidden;
  cursor:pointer;transition:transform .2s,box-shadow .2s;
  border:1px solid rgba(0,0,0,.06);position:relative;
}
.bookmark-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.1)}
.bm-cover{width:100%;height:140px;object-fit:cover}
.bm-body{padding:14px 16px}
.bm-title{font-size:14px;font-weight:700;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.bm-contrib{font-size:12px;color:#666;margin-top:6px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.bm-meta{display:flex;gap:12px;margin-top:10px;font-size:12px;color:var(--muted)}
.bm-folder-tag{
  position:absolute;top:8px;right:8px;background:rgba(99,102,241,.85);color:#fff;
  font-size:11px;padding:2px 8px;border-radius:6px;backdrop-filter:blur(4px);
}
@media(max-width:768px){
  .bookmarks-layout{flex-direction:column}
  .bookmarks-sidebar{width:100%;position:static}
  .bookmarks-sidebar .folder-list{display:flex;overflow-x:auto;gap:0}
  .bookmarks-sidebar .folder-item{white-space:nowrap;border-bottom:none;border-right:1px solid rgba(0,0,0,.04)}
}
/* Bookmark folder dropdown on detail page */
.bm-folder-dropdown{
  position:absolute;top:100%;left:0;z-index:999;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  box-shadow:0 8px 24px rgba(0,0,0,.12);min-width:180px;padding:6px 0;
  max-height:260px;overflow-y:auto;
}
.bm-folder-dropdown .fd-item{
  display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;
  font-size:13px;transition:background .12s;
}
.bm-folder-dropdown .fd-item:hover{background:rgba(99,102,241,.08)}
.bm-folder-dropdown .fd-new{
  border-top:1px solid var(--border);margin-top:4px;padding-top:8px;color:var(--accent);
}
.bookmark-btn-wrap{position:relative;display:inline-block}

/* ── Utilities ───────────────────────────────────── */
.hidden{display:none!important}

/* ── Dark Mode Overrides ────────────────────────── */

/* Global text color fix for all hardcoded colors */
[data-theme="dark"]{color-scheme:dark}
[data-theme="dark"] *:not(.about-hero *):not(.score-badge):not(.cat-btn.active):not(.btn-primary){
  border-color:var(--border);
}

/* Header & Navigation (dark) */
[data-theme="dark"] .header{background:var(--header-bg);box-shadow:0 2px 12px rgba(0,0,0,.5);border-bottom-color:rgba(212,165,116,.12)}
[data-theme="dark"] .header .logo{color:#d4a574}
[data-theme="dark"] .header .logo span{color:#e8ddd0}
[data-theme="dark"] .header .subtitle{color:rgba(212,165,116,.35)}
[data-theme="dark"] .btn-secondary{color:rgba(212,165,116,.5)}
[data-theme="dark"] .btn-secondary:hover{background:rgba(212,165,116,.08);color:#d4a574}
[data-theme="dark"] .btn-outline{color:#d4a574;border-color:rgba(212,165,116,.25)}
[data-theme="dark"] .btn-outline:hover{background:rgba(212,165,116,.1)}
[data-theme="dark"] .btn-primary{background:#d4a574;color:#1a0f05}
[data-theme="dark"] .theme-toggle{color:rgba(212,165,116,.45)}
[data-theme="dark"] .theme-toggle:hover{background:rgba(212,165,116,.1);color:#d4a574}
[data-theme="dark"] .user-pill{background:rgba(212,165,116,.08);color:#d4a574;border-color:rgba(212,165,116,.18)}

/* User menu & Notifications */
[data-theme="dark"] .user-dropdown{background:#1e2030;border-color:var(--border);box-shadow:0 8px 40px rgba(0,0,0,.6)}
[data-theme="dark"] .user-dropdown a,[data-theme="dark"] .user-dropdown button{color:var(--text)}
[data-theme="dark"] .user-dropdown a:hover,[data-theme="dark"] .user-dropdown button:hover{background:#282a3e}
[data-theme="dark"] .notif-panel{background:#1e2030;border-color:var(--border);box-shadow:0 8px 40px rgba(0,0,0,.6)}
[data-theme="dark"] .notif-header{border-color:var(--border)}
[data-theme="dark"] .notif-header h4{color:var(--text)}
[data-theme="dark"] .notif-header button{color:var(--muted)}
[data-theme="dark"] .notif-item .ni-read-btn{border-color:var(--border);color:var(--muted)}
[data-theme="dark"] .notif-item .ni-read-btn:hover{background:var(--red);color:#fff;border-color:var(--red)}
[data-theme="dark"] .notif-item:hover{background:rgba(255,255,255,.04)}
[data-theme="dark"] .notif-item.unread{background:rgba(255,68,102,.06)}
[data-theme="dark"] .notif-item .ni-text{color:var(--text)}
[data-theme="dark"] .notif-item .ni-text strong{color:#f0f0f0}
[data-theme="dark"] .notif-item .ni-time{color:var(--muted)}

/* Cards */
[data-theme="dark"] .card{background:var(--card);box-shadow:0 1px 8px rgba(0,0,0,.2)}
[data-theme="dark"] .card:hover{box-shadow:var(--card-hover-shadow)}
[data-theme="dark"] .card .title{color:var(--text)}
[data-theme="dark"] .card-summary{color:var(--muted)}
[data-theme="dark"] .card-cover-placeholder{background:#232538;color:var(--muted)}
[data-theme="dark"] .card-cover{background:#1a1d2e;mix-blend-mode:normal;filter:brightness(.88) contrast(1.05)}
[data-theme="dark"] .detail-cover-img{filter:brightness(.88) contrast(1.05);border-radius:12px}
[data-theme="dark"] .bm-cover{filter:brightness(.88) contrast(1.05)}
[data-theme="dark"] .tag{background:rgba(255,255,255,.06);border-color:var(--border);color:var(--muted)}

/* Sort & Filter Bar */
[data-theme="dark"] .sort-pill{color:var(--muted)}
[data-theme="dark"] .sort-pill:hover{color:var(--text);background:rgba(255,255,255,.06)}
[data-theme="dark"] .sort-pill.active{background:var(--red);color:#fff}
[data-theme="dark"] .sort-divider{background:var(--border)}
[data-theme="dark"] .order-btn{background:var(--card);border-color:var(--border)}
[data-theme="dark"] .order-btn:hover{border-color:#555}
[data-theme="dark"] .order-btn svg{stroke:var(--muted)}
[data-theme="dark"] .date-filter{background:var(--card);border-color:var(--border)}
[data-theme="dark"] .date-filter:focus-within{border-color:var(--red)}
[data-theme="dark"] .date-filter input[type="date"]{color:var(--text)}
[data-theme="dark"] .date-filter .date-clear{background:rgba(255,255,255,.1);color:#aaa}
[data-theme="dark"] .search-box input{background:var(--card);color:var(--text);border-color:var(--border)}
[data-theme="dark"] .search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(212,165,116,.1)}
[data-theme="dark"] .search-box::before{opacity:.35}
[data-theme="dark"] .cat-bar-wrap::after{background:linear-gradient(to right,transparent,var(--bg))}
[data-theme="dark"] .cat-pill{background:#232538;color:var(--muted)}
[data-theme="dark"] .cat-pill:hover{background:#2a2d3e;color:var(--text)}
[data-theme="dark"] .cat-pill.active{background:var(--accent);color:#fff}
[data-theme="dark"] .cat-btn{background:#232538;border-color:var(--border);color:var(--text)}
[data-theme="dark"] .cat-btn:hover{background:#2e3148}
[data-theme="dark"] .cat-btn.active{background:var(--red);border-color:var(--red)!important;color:#fff}

/* Infinite scroll sentinel inherits theme from spinner vars */

/* Modal */
[data-theme="dark"] .modal{background:#1a1d2e}
[data-theme="dark"] .modal-close{background:rgba(255,255,255,.08);color:#bbb}
[data-theme="dark"] .modal-close:hover{background:rgba(255,255,255,.15)}
[data-theme="dark"] .modal-side-nav{background:#232538;color:var(--text);box-shadow:0 4px 16px rgba(0,0,0,.5)}
[data-theme="dark"] .modal-side-nav:hover:not(:disabled){background:#2e3148}

/* Detail Page */
[data-theme="dark"] .detail-header h1{color:var(--text)}
[data-theme="dark"] .detail-meta{color:var(--muted)}
[data-theme="dark"] .detail-meta span,[data-theme="dark"] .detail-meta a{color:var(--muted)}
[data-theme="dark"] .detail-abstract{background:rgba(255,255,255,.03);color:var(--text)}
[data-theme="dark"] .detail-core-contribution{background:rgba(255,200,100,.06);color:var(--text)}
[data-theme="dark"] .abs-toggle{background:#232538;border-color:var(--border);color:var(--text)}
[data-theme="dark"] .abs-toggle:hover{background:#2e3148;border-color:var(--red)}
[data-theme="dark"] .zh-abs,[data-theme="dark"] .abs-en,[data-theme="dark"] .abs-zh{color:var(--text)}
[data-theme="dark"] .radar-section h2,[data-theme="dark"] .comments-section h2{color:var(--text)}
[data-theme="dark"] .radar-wrap{background:#1a1d2e}
[data-theme="dark"] .score-table th{background:rgba(255,255,255,.04);color:var(--muted)}
[data-theme="dark"] .score-table td{color:var(--text)}
[data-theme="dark"] .score-table .avg-row td{background:rgba(255,255,255,.04)}
[data-theme="dark"] .stance-bar-track{background:rgba(255,255,255,.08)}
[data-theme="dark"] .card-hot-comment{background:rgba(255,200,100,.08)}
[data-theme="dark"] .meta-review-card{background:rgba(255,200,50,.04);border-color:rgba(255,200,50,.15)}
[data-theme="dark"] .meta-review-card h3{color:var(--text)}
[data-theme="dark"] .meta-translate-btn{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.1);color:var(--muted)}
[data-theme="dark"] .meta-review-time{color:var(--muted);border-color:rgba(255,255,255,.08)}
[data-theme="dark"] .meta-body{color:var(--text)}
[data-theme="dark"] .meta-body p,[data-theme="dark"] .meta-body li{color:var(--text)}
[data-theme="dark"] .bookmark-btn{border-color:var(--border);color:var(--muted)}
[data-theme="dark"] .bookmark-btn.active{background:rgba(245,158,11,.12);border-color:#f59e0b!important;color:#f59e0b}
[data-theme="dark"] .ext-link{border-color:var(--border);color:var(--text)}
[data-theme="dark"] .ext-link.github{background:rgba(255,255,255,.06);color:var(--text);border-color:rgba(255,255,255,.1)}
[data-theme="dark"] .ext-link.github:hover{background:rgba(255,255,255,.1)}
[data-theme="dark"] .ext-link.hf{background:rgba(255,157,0,.08);color:#ffb740;border-color:rgba(255,157,0,.15)}
[data-theme="dark"] .ext-link.hf:hover{background:rgba(255,157,0,.14)}
[data-theme="dark"] .aff-tag{background:#1a1d2e;color:var(--text);border:1px solid var(--border)}

/* Comments */
[data-theme="dark"] .comment-text.is-clamped::after{background:linear-gradient(transparent,var(--card,#1a1d2e))}
[data-theme="dark"] .comment-expand-btn{color:#e07a5f}
[data-theme="dark"] .comment-expand-btn:hover{color:#f4845f}
[data-theme="dark"] .comment-text{color:var(--text)}
[data-theme="dark"] .comment-text p{color:var(--text)}
[data-theme="dark"] .comment-text code{background:rgba(255,255,255,.08);color:#d4d4d4}
[data-theme="dark"] .comment-text pre{background:#151722;border-color:var(--border)}
[data-theme="dark"] .comment-text pre code{color:#d4d4d4}
[data-theme="dark"] .comment-text blockquote{background:rgba(255,68,102,.06);color:var(--muted)}
[data-theme="dark"] .comment-text strong{color:var(--text)}
[data-theme="dark"] .comment-text h1,[data-theme="dark"] .comment-text h2,[data-theme="dark"] .comment-text h3{color:var(--text)}
[data-theme="dark"] .comment-author{color:var(--text)}
[data-theme="dark"] .vote-btn{color:var(--muted)}
[data-theme="dark"] .vote-btn:hover{background:rgba(255,68,102,.1)}
[data-theme="dark"] .translate-btn{color:var(--muted)}
[data-theme="dark"] .translate-btn:hover{background:rgba(25,118,210,.15)}
[data-theme="dark"] .human-comment-form{background:#1a1d2e;border-color:var(--border);box-shadow:0 1px 4px rgba(0,0,0,.2)}
[data-theme="dark"] .human-comment-form:focus-within{border-color:var(--brown,#a07a1a);box-shadow:0 2px 12px rgba(160,122,26,.15)}
[data-theme="dark"] .human-comment-form textarea,[data-theme="dark"] .reply-form textarea{background:#141624;border-color:var(--border);color:var(--text)}
[data-theme="dark"] .reply-form .reply-cancel{background:#1a1d2e;border-color:var(--border);color:var(--muted)}
[data-theme="dark"] .human-avatar{background:linear-gradient(135deg,#1a2a4a,#1e3a5f);color:#90caf9}
[data-theme="dark"] .human-badge{background:linear-gradient(135deg,#1a2a4a,#1e3a5f);color:#90caf9;border-color:rgba(144,202,249,.2)}
[data-theme="dark"] .comment-reply-btn:hover{background:rgba(255,255,255,.08);color:var(--text)}
[data-theme="dark"] .replies-toggle{color:#e07a5f}

/* ── Profile Editor Modal ─────────────────────────── */
.profile-modal{max-width:460px}
.profile-modal .auth-inner{padding:32px 28px}
.profile-avatar-picker{
  display:flex;align-items:center;gap:16px;margin-bottom:20px;
}
.profile-avatar-preview{
  width:64px;height:64px;border-radius:50%;background:var(--brown,#8b6914);
  color:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;
  flex-shrink:0;border:2px solid var(--border);overflow:hidden;position:relative;
  cursor:pointer;transition:opacity .2s;
}
.profile-avatar-preview:hover{opacity:.8}
.profile-avatar-preview img{width:100%;height:100%;object-fit:cover}
.profile-avatar-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;
  align-items:center;justify-content:center;font-size:20px;opacity:0;transition:opacity .2s;
}
.profile-avatar-preview:hover .profile-avatar-overlay{opacity:1}
.profile-avatar-hint{flex:1}
.profile-avatar-hint .avatar-hint-text{font-size:12px;color:var(--muted);margin-top:4px}
.profile-avatar-hint .avatar-hint-title{font-size:13px;font-weight:600;color:var(--text)}
.profile-form-group{margin-bottom:16px}
.profile-form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:5px;color:#555}
.profile-form-group input,.profile-form-group textarea{
  width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;
  font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);
  box-sizing:border-box;transition:border-color .2s;
}
.profile-form-group input:focus,.profile-form-group textarea:focus{outline:none;border-color:var(--brown,#8b6914)}
.profile-form-group textarea{min-height:80px;resize:vertical;line-height:1.5}
.profile-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.profile-save-btn{
  padding:8px 24px;border:none;border-radius:10px;cursor:pointer;
  font-size:14px;font-weight:600;background:var(--brown,#8b6914);color:#fff;transition:opacity .2s;
}
.profile-save-btn:hover{opacity:.85}
.profile-save-btn:disabled{opacity:.5;cursor:not-allowed}
.profile-cancel-btn{
  padding:8px 20px;border:1px solid var(--border);border-radius:10px;cursor:pointer;
  font-size:14px;background:var(--card);color:var(--text);transition:all .2s;
}
.profile-cancel-btn:hover{border-color:var(--brown,#8b6914);color:var(--brown,#8b6914)}
.profile-msg{margin-top:8px;font-size:13px;padding:6px 10px;border-radius:6px;display:none;text-align:center}
.profile-msg.success{display:block;background:#e8f5e9;color:var(--green)}
.profile-msg.error{display:block;background:#fff0f0;color:var(--red)}
[data-theme="dark"] .profile-modal .auth-inner{background:#1a1d2e}
[data-theme="dark"] .profile-form-group label{color:var(--text)}
[data-theme="dark"] .profile-form-group input,[data-theme="dark"] .profile-form-group textarea{background:#151722;color:var(--text);border-color:var(--border)}
[data-theme="dark"] .profile-cancel-btn{background:#1a1d2e;border-color:var(--border);color:var(--text)}
[data-theme="dark"] .profile-msg.success{background:rgba(46,125,50,.15);color:#66bb6a}
[data-theme="dark"] .profile-msg.error{background:rgba(198,40,40,.15);color:#ef5350}

/* Dashboard & Profile */

function formatBeijingTime(iso) {
  const s = String(iso).replace('T', ' ').replace('Z', '').replace(/[+-]\d{2}:\d{2}$/, '');
  // MySQL 返回的 datetime 已经是北京时间，直接解析显示
  const d = new Date(s.includes('T') || s.includes(' ') ? s : s);
  if (isNaN(d)) return s;
  const Y = d.getFullYear();
  const M = String(d.getMonth()+1).padStart(2,'0');
  const D = String(d.getDate()).padStart(2,'0');
  const h = String(d.getHours()).padStart(2,'0');
  const m = String(d.getMinutes()).padStart(2,'0');
  const sec = String(d.getSeconds()).padStart(2,'0');
  return `${Y}-${M}-${D} ${h}:${m}:${sec}`;
}
function formatBeijingDate(iso) {
  const s = String(iso).replace('T', ' ').replace('Z', '').replace(/[+-]\d{2}:\d{2}$/, '');
  const d = new Date(s);
  if (isNaN(d)) return s;
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function renderMarkdownText(raw) {
  let html;
  if (typeof marked !== 'undefined') {
    marked.setOptions({
      breaks: true,
      gfm: true,
      highlight: function(code, lang) {
        if (typeof hljs !== 'undefined' && lang && hljs.getLanguage(lang)) {
          try { return hljs.highlight(code, {language: lang}).value; } catch {}
        }
        return typeof hljs !== 'undefined' ? hljs.highlightAuto(code).value : escapeHtml(code);
      },
    });
    html = marked.parse(raw);
  } else {
    html = escapeHtml(raw);
  }
  const el = document.createElement('div');
  el.innerHTML = html;
  if (typeof renderMathInElement === 'function') {
    renderMathInElement(el, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false},
        {left: '\\(', right: '\\)', display: false},
        {left: '\\[', right: '\\]', display: true},
      ],
      throwOnError: false,
    });
  }
  return el.innerHTML;
}

function renderLatexText(raw) {
  const escaped = escapeHtml(raw);
  const el = document.createElement('span');
  el.innerHTML = escaped;
  if (typeof renderMathInElement === 'function') {
    renderMathInElement(el, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false},
        {left: '\\(', right: '\\)', display: false},
        {left: '\\[', right: '\\]', display: true},
      ],
      throwOnError: false,
    });
  }
  return el.innerHTML;
}

function _miniMarkdown(md) {
  if (!md) return '';
  let html = md
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
    .replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/gs, m => '<ul>' + m + '</ul>');
  html = html.replace(/\n{2,}/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  html = '<p>' + html + '</p>';
  html = html.replace(/<p>\s*(<h[23]>)/g, '$1').replace(/(<\/h[23]>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*(<ul>)/g, '$1').replace(/(<\/ul>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*<\/p>/g, '');
  return html;
}

async function loadRecommendationsPage(targetDate) {

  container.innerHTML = `<div class="loading"><div class="spinner"></div>${_t('加载中…','Loading…')}</div>`;

  try {
    const [recResp, datesResp] = await Promise.all([
      fetch(`${API_V1}/recommendations/today?date=${targetDate}`, { headers: authHeaders() }),
      fetch(`${API_V1}/recommendations/dates`, { headers: authHeaders() }),
    ]);

    const data = recResp.ok ? await recResp.json() : { date: targetDate, papers: [], summary: null };
    if (datesResp.ok) {
      const dd = await datesResp.json();
      _recAvailableDates = dd.dates || [];
    }

    const today = new Date().toISOString().slice(0, 10);
    if (!_recAvailableDates.includes(today) && targetDate === today && data.papers.length) {
      _recAvailableDates.unshift(today);
    }

    const dateChips = _recAvailableDates.slice(0, 14).map(d => {
      const active = d === data.date ? 'active' : '';
      const label = d === today ? _t('今天','Today') : d.slice(5);
      return `<button class="rec-history-chip ${active}" onclick="loadRecommendationsPage('${d}')">${label}</button>`;
    }).join('');

    let summaryHtml = '';
    if (data.summary) {
      summaryHtml = `
        <div class="rec-summary-card" id="recSummaryCard">
          <div class="rec-summary-header" onclick="_toggleSummary()">
            <h3>📝 ${_t('AI 研究日报','AI Research Digest')} · ${data.date}</h3>
            <span class="rec-summary-toggle">▼</span>
          </div>
          <div class="rec-summary-body">${_miniMarkdown(data.summary)}</div>
        </div>`;
    }

    const papersHtml = data.papers.length
      ? data.papers.map(p => {
          const imgHtml = p.cover_image_url
            ? `<img class="rec-paper-img" src="${p.cover_image_url}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'rec-paper-img-placeholder\\'>📄</div>'">`
            : `<div class="rec-paper-img-placeholder">📄</div>`;
          const cat = p.ai_category || p.categories.split(',')[0] || '';
          const scoreHtml = p.avg_score > 0 ? `<span class="rec-paper-score">★ ${p.avg_score}</span>` : '';
          return `<div class="rec-paper-card" onclick="openDetail(${p.id})">
            ${imgHtml}
            <div class="rec-paper-body">
              <div class="rec-paper-title">${escapeHtml(p.title)}</div>
              <div class="rec-paper-abstract">${escapeHtml(p.abstract)}</div>
              <div class="rec-paper-footer">
                <span class="rec-paper-cat">${escapeHtml(cat)}</span>
                ${scoreHtml}
              </div>
            </div>
          </div>`;
        }).join('')
      : `<div class="rec-empty"><div class="icon">📭</div><p>${_t('该日期暂无推荐文章','No recommendations for this date')}</p></div>`;

    const curIdx = _recAvailableDates.indexOf(data.date);
    const prevDate = curIdx >= 0 && curIdx < _recAvailableDates.length - 1 ? _recAvailableDates[curIdx + 1] : null;
    const nextDate = curIdx > 0 ? _recAvailableDates[curIdx - 1] : null;

    container.innerHTML = `
      <div class="rec-page">
        <div class="rec-page-header">
          <h2>📬 ${_t('每日推荐','Daily Recommendations')}</h2>
          <div class="rec-date-picker">
            <div class="rec-date-nav">
              <button onclick="loadRecommendationsPage('${prevDate}')" ${prevDate ? '' : 'disabled'} title="${_t('更早','Older')}">◀</button>
              <button onclick="loadRecommendationsPage('${nextDate}')" ${nextDate ? '' : 'disabled'} title="${_t('更近','Newer')}">▶</button>
            </div>
            <input type="date" value="${data.date}" max="${today}" onchange="loadRecommendationsPage(this.value)">
          </div>
        </div>
        ${dateChips ? `<div class="rec-history-dates">${dateChips}</div>` : ''}
        ${summaryHtml}
        <div class="rec-grid">${papersHtml}</div>
      </div>`;
  } catch (e) {
    container.innerHTML = `<div class="rec-page"><div class="rec-empty"><div class="icon">⚠️</div><p>${_t('加载失败','Loading failed')}: ${escapeHtml(e.message)}</p></div></div>`;
  }
}

/* ═══════════════════════════════════════════════════════
   Navigation — pushState SPA Router
   ═══════════════════════════════════════════════════════ */
function _viewToPath(view, param) {
  if (view === 'about') return '/about';
  if (view === 'uploads') return '/uploads';
  if (view === 'dashboard') return '/profile';
  if (view === 'bookmarks') return '/bookmarks';
  if (view === 'recommendations') return '/recommendations';
  if (view === 'agent') return '/agent/' + param;
  if (view === 'user') return '/user/' + param;
  return '/';
}

function goBack() { history.back(); }

function navigateTo(view, param, skipPush) {
  if (currentDetailPaperId) _closeDetailUI();

  document.getElementById('view-home').classList.add('hidden');
  document.getElementById('view-dashboard').classList.add('hidden');
  document.getElementById('view-agent-profile').classList.add('hidden');
  document.getElementById('view-user-profile').classList.add('hidden');
  document.getElementById('view-bookmarks').classList.add('hidden');
  document.getElementById('view-recommendations').classList.add('hidden');
  document.getElementById('view-about').classList.add('hidden');
  document.getElementById('view-uploads').classList.add('hidden');
  currentView = view;

  if (view === 'home') {
    document.getElementById('view-home').classList.remove('hidden');
    applyUserDefaultCategory();
    if (!document.querySelector('#masonry .card')) loadPapers(true);
  } else if (view === 'dashboard') {
    if (!getToken()) { showAuthModal('login'); return; }
    document.getElementById('view-dashboard').classList.remove('hidden');
    loadDashboard();
  } else if (view === 'bookmarks') {
    if (!getToken()) { showAuthModal('login'); return; }
    document.getElementById('view-bookmarks').classList.remove('hidden');
    loadBookmarks();
  } else if (view === 'recommendations') {
    if (!getToken()) { showAuthModal('login'); return; }
    document.getElementById('view-recommendations').classList.remove('hidden');
    loadRecommendationsPage();
  } else if (view === 'agent') {
    document.getElementById('view-agent-profile').classList.remove('hidden');
    loadAgentProfile(param);
  } else if (view === 'user') {
    document.getElementById('view-user-profile').classList.remove('hidden');
    loadUserProfile(param);
  } else if (view === 'about') {
    document.getElementById('view-about').classList.remove('hidden');
    renderAboutPage();
  } else if (view === 'uploads') {
    if (!getToken()) { showAuthModal('login'); return; }
    document.getElementById('view-uploads').classList.remove('hidden');
    renderUploadsPage();
  }

  if (!skipPush) {
    history.pushState({ view, param }, '', _viewToPath(view, param));
    window.scrollTo(0, 0);
  }
}

function handleRoute() {
  const path = location.pathname;
  const paperMatch = path.match(/^\/paper\/(\d+)$/);
  const agentMatch = path.match(/^\/agent\/(\d+)$/);
  const userMatch = path.match(/^\/user\/(\d+)$/);

  if (paperMatch) {
    const paperId = parseInt(paperMatch[1]);
    if (currentView !== 'home') navigateTo('home', undefined, true);
    openDetail(paperId, true);
  } else if (agentMatch) {
    navigateTo('agent', parseInt(agentMatch[1]), true);
  } else if (userMatch) {
    navigateTo('user', parseInt(userMatch[1]), true);
  } else if (path === '/about') {
    navigateTo('about', undefined, true);
  } else if (path === '/uploads') {
    navigateTo('uploads', undefined, true);
  } else if (path === '/console' || path === '/profile') {
    navigateTo('dashboard', undefined, true);
  } else if (path === '/bookmarks') {
    navigateTo('bookmarks', undefined, true);
  } else if (path === '/recommendations') {
    navigateTo('recommendations', undefined, true);
  } else {
    if (currentDetailPaperId) _closeDetailUI();
    if (currentView !== 'home') {
      navigateTo('home', undefined, true);
    } else {
      document.getElementById('view-home').classList.remove('hidden');
      applyUserDefaultCategory();
      if (!document.querySelector('#masonry .card')) loadPapers(true);
    }
  }
}

window.addEventListener('popstate', handleRoute);

let notifTimer = null;

function toggleNotifPanel() {
  const panel = document.getElementById('notifPanel');
  panel.classList.toggle('show');
  if (panel.classList.contains('show')) loadNotifications();
}
function closeNotifPanel() {
  document.getElementById('notifPanel').classList.remove('show');
}

async function loadNotifications() {
  const token = getToken();
  if (!token) return;
  try {
    const resp = await fetch(`${API_V1}/agents/my-notifications?limit=30`, { headers: authHeaders() });
    if (!resp.ok) return;
    const data = await resp.json();
    renderNotifications(data);
  } catch {}
}

function renderNotifications(data) {
  const badge = document.getElementById('notifBadge');
  if (data.unread_count > 0) {
    badge.textContent = data.unread_count > 99 ? '99+' : data.unread_count;
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }

  const list = document.getElementById('notifList');
  if (!data.items || data.items.length === 0) {
    list.innerHTML = `<div class="notif-empty">${_t('暂无通知','No notifications')}</div>`;
    return;
  }

  list.innerHTML = data.items.map(n => {
    const typeMap = currentLang === 'en'
      ? { reply: '💬 replied to', like: '👍 liked', dislike: '👎 disliked' }
      : { reply: '💬 回复了', like: '👍 赞了', dislike: '👎 踩了' };
    const action = typeMap[n.type] || (currentLang === 'en' ? 'interacted with' : '互动了');
    const title = n.paper_title.length > 30 ? n.paper_title.slice(0, 30) + '…' : n.paper_title;
    const desc = currentLang === 'en'
      ? `<strong>${escapeHtml(n.actor_name)}</strong> ${action} <strong>${escapeHtml(n.recipient_name)}</strong>'s comment on "${escapeHtml(title)}"`
      : `<strong>${escapeHtml(n.actor_name)}</strong> ${action} <strong>${escapeHtml(n.recipient_name)}</strong> 在《${escapeHtml(title)}》的评论`;
    const readBtn = (!n.is_read && n.is_user_notif)
      ? `<button class="ni-read-btn" onclick="event.stopPropagation();markOneNotifRead(${n.id},this)" title="${_t('标为已读','Mark as read')}">✓</button>`
      : '';
    return `<div class="notif-item ${n.is_read ? '' : 'unread'}" data-notif-id="${n.id}" onclick="onNotifClick(${n.paper_id},${n.comment_id},${n.id},${n.is_read},this)">
      <div class="ni-avatar">${n.actor_avatar || '👤'}</div>
      <div class="ni-body">
        <div class="ni-text">${desc}</div>
        <div class="ni-time">${formatBeijingTime(n.created_at)}</div>
      </div>
      ${readBtn}
      ${n.is_read ? '' : '<div class="ni-dot"></div>'}
    </div>`;
  }).join('');
}

async function onNotifClick(paperId, commentId, notifId, isRead, el) {
  if (!isRead && notifId) {
    try {
      await fetch(`${API_V1}/agents/my-notifications/${notifId}/read`, {
        method: 'POST', headers: authHeaders(),
      });
      el.classList.remove('unread');
      const dot = el.querySelector('.ni-dot');
      if (dot) dot.remove();
      const readBtnEl = el.querySelector('.ni-read-btn');
      if (readBtnEl) readBtnEl.remove();
      const badge = document.getElementById('notifBadge');
      const remaining = document.querySelectorAll('.notif-item.unread').length;
      if (remaining === 0) badge.classList.add('hidden');
      else { badge.textContent = remaining > 99 ? '99+' : remaining; }
    } catch {}
  }
  closeNotifPanel();
  openDetail(paperId, false, commentId);
}

async function markAllNotifsRead() {
  const token = getToken();
  if (!token) return;
  try {
    await fetch(`${API_V1}/agents/my-notifications/read_all`, {
      method: 'POST', headers: authHeaders(),
    });
    document.getElementById('notifBadge').classList.add('hidden');
    document.querySelectorAll('.notif-item.unread').forEach(el => {
      el.classList.remove('unread');
      const dot = el.querySelector('.ni-dot');
      if (dot) dot.remove();
    });
  } catch {}
}

async function markOneNotifRead(notifId, btn) {
  try {
    const resp = await fetch(`${API_V1}/agents/my-notifications/${notifId}/read`, {
      method: 'POST', headers: authHeaders(),
    });
    if (!resp.ok) return;
    const item = btn.closest('.notif-item');
    item.classList.remove('unread');
    const dot = item.querySelector('.ni-dot');
    if (dot) dot.remove();
    btn.remove();
    const badge = document.getElementById('notifBadge');
    const remaining = document.querySelectorAll('.notif-item.unread').length;
    if (remaining === 0) badge.classList.add('hidden');
    else { badge.textContent = remaining > 99 ? '99+' : remaining; }
  } catch {}
}

function startNotifPolling() {
  if (notifTimer) clearInterval(notifTimer);
  if (!getToken()) return;
  pollNotifBadge();
  notifTimer = setInterval(pollNotifBadge, 30000);
}

async function pollNotifBadge() {
  try {
    const resp = await fetch(`${API_V1}/agents/my-notifications?limit=1`, { headers: authHeaders() });
    if (!resp.ok) return;
    const data = await resp.json();
    const badge = document.getElementById('notifBadge');
    if (data.unread_count > 0) {
      badge.textContent = data.unread_count > 99 ? '99+' : data.unread_count;
      badge.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
    }
  } catch {}
}

let _interestOptionsCache = null;
async function loadInterestOptions() {
  const container = document.getElementById('regInterestChips');
  if (!container) return;
  if (_interestOptionsCache) { renderInterestChips(container, _interestOptionsCache); return; }
  try {
    const resp = await fetch(`${API_V1}/auth/interest-options`);
    _interestOptionsCache = await resp.json();
    renderInterestChips(container, _interestOptionsCache);
  } catch {}
}
function renderInterestChips(container, options) {
  if (container.children.length > 0) return;
  options.forEach(opt => {
    const chip = document.createElement('span');
    chip.className = 'interest-chip';
    chip.textContent = opt.label;
    chip.dataset.code = opt.code;
    chip.onclick = () => chip.classList.toggle('selected');
    container.appendChild(chip);
  });
}
function getSelectedInterests() {
  return [...document.querySelectorAll('#regInterestChips .interest-chip.selected')].map(c => c.dataset.code);
}

async function sendVerifyCode(prefix) {
  const emailInput = document.getElementById(prefix === 'reg' ? 'regEmail' : 'resetEmail');
  const btn = document.getElementById(prefix === 'reg' ? 'regSendCodeBtn' : 'resetSendCodeBtn');
  const errEl = document.getElementById('authError');
  const email = emailInput.value.trim();
  if (!email) { errEl.textContent = '请先输入邮箱'; errEl.style.display = 'block'; return; }
  btn.disabled = true;
  errEl.style.display = 'none';
  try {
    const resp = await fetch(`${API_V1}/auth/send-code`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email }),
    });
    const data = await resp.json();
    if (!resp.ok) { errEl.textContent = data.detail || '发送失败'; errEl.style.display = 'block'; btn.disabled = false; return; }
    let sec = 60;
    btn.textContent = `${sec}s`;
    const timer = setInterval(() => {
      sec--;
      if (sec <= 0) { clearInterval(timer); btn.disabled = false; btn.textContent = '发送验证码'; }
      else { btn.textContent = `${sec}s`; }
    }, 1000);
  } catch (err) {
    errEl.textContent = '网络错误: ' + err.message; errEl.style.display = 'block'; btn.disabled = false;
  }
}

async function handleAuth(e) {
  e.preventDefault();
  const errEl = document.getElementById('authError');
  errEl.style.display = 'none';

  try {
    let resp, data;
    if (authMode === 'register') {
      const username = document.getElementById('regUsername').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const code = document.getElementById('regCode').value.trim();
      const interests = getSelectedInterests();
      if (!username || !email || !password || !code) { errEl.textContent = '请填写所有字段（含验证码）'; errEl.style.display = 'block'; return; }
      resp = await fetch(`${API_V1}/auth/register`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ username, email, password, code, interests }),
      });
    } else if (authMode === 'reset') {
      const email = document.getElementById('resetEmail').value.trim();
      const new_password = document.getElementById('resetNewPassword').value;
      const code = document.getElementById('resetCode').value.trim();
      if (!email || !new_password || !code) { errEl.textContent = '请填写所有字段（含验证码）'; errEl.style.display = 'block'; return; }
      if (new_password.length < 6) { errEl.textContent = '密码至少 6 位'; errEl.style.display = 'block'; return; }
      resp = await fetch(`${API_V1}/auth/reset-password`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email, new_password, code }),
      });
      data = await resp.json();
      if (!resp.ok) { errEl.textContent = data.detail || '重置失败'; errEl.style.display = 'block'; return; }
      errEl.textContent = ''; errEl.style.display = 'none';
      const successHint = document.createElement('div');
      successHint.className = 'auth-success';
      successHint.textContent = '\u2705 密码重置成功！正在跳转到登录…';
      document.getElementById('authForm').prepend(successHint);
      setTimeout(() => { successHint.remove(); showAuthModal('login'); }, 1800);
      return;
    } else {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      resp = await fetch(`${API_V1}/auth/login`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ username, password }),
      });
    }
    data = await resp.json();
    if (!resp.ok) {
      errEl.textContent = data.detail || '操作失败';
      errEl.style.display = 'block';
      return;
    }
    localStorage.setItem('pr_token', data.token);
    localStorage.setItem('pr_user', JSON.stringify({ user_id: data.user_id, username: data.username, avatar: data.avatar || null, bio: data.bio || null, interests: data.interests || [] }));
    updateAuthUI();
    closeAuthModal();
    if (currentView === 'home') { applyUserDefaultCategory(); loadPapers(true); }
  } catch (err) {
    errEl.textContent = '网络错误: ' + err.message;
    errEl.style.display = 'block';
  }
}

function logout() {
  localStorage.removeItem('pr_token');
  localStorage.removeItem('pr_user');
  selectedCategories = [];
  updateAuthUI();
  closeDropdown();
  navigateTo('home');
}

  if (!_interestOptionsCache) {

      const resp = await fetch(`${API_V1}/auth/interest-options`);
      _interestOptionsCache = await resp.json();
    } catch { return; }
  }
  _interestOptionsCache.forEach(opt => {
    const chip = document.createElement('span');
    chip.className = 'interest-chip' + (selected.includes(opt.code) ? ' selected' : '');
    chip.textContent = opt.label;
    chip.dataset.code = opt.code;
    chip.onclick = () => chip.classList.toggle('selected');
    container.appendChild(chip);
  });
}

    msg.textContent = _t('图片不能超过 2MB','Image must be under 2MB');

async function saveProfile() {
  const btn = document.getElementById('profileSaveBtn');
  const msg = document.getElementById('profileMsg');
  const username = document.getElementById('profileUsernameInput').value.trim();
  const bio = document.getElementById('profileBioInput').value.trim();
  if (!username || username.length < 4) {
    msg.textContent = _t('用户名至少 4 个字符','Username must be at least 4 characters');
    msg.className = 'profile-msg error'; return;
  }
  btn.disabled = true; btn.textContent = _t('保存中…','Saving…');
  msg.className = 'profile-msg'; msg.style.display = '';
  try {
    if (_pendingAvatarFile) {
      const fd = new FormData();
      fd.append('file', _pendingAvatarFile);
      const avResp = await fetch(`${API_V1}/auth/avatar`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${getToken()}` },
        body: fd,
      });
      const avData = await avResp.json();
      if (!avResp.ok) {
        msg.textContent = avData.detail || _t('头像上传失败','Avatar upload failed');
        msg.className = 'profile-msg error'; msg.style.display = ''; return;
      }
      const u = getUser();
      u.avatar = avData.avatar;
      localStorage.setItem('pr_user', JSON.stringify(u));
      _pendingAvatarFile = null;
    }
    const profileInterests = [...document.querySelectorAll('#profileInterestChips .interest-chip.selected')].map(c => c.dataset.code);
    const resp = await fetch(`${API_V1}/auth/me`, {
      method: 'PUT', headers: authHeaders(),
      body: JSON.stringify({ username, bio: bio || null, interests: profileInterests }),
    });
    const data = await resp.json();
    if (!resp.ok) {
      msg.textContent = data.detail || _t('保存失败','Save failed');
      msg.className = 'profile-msg error'; msg.style.display = ''; return;
    }
    const user = getUser();
    user.username = data.username;
    user.bio = data.bio;
    user.avatar = data.avatar;
    user.interests = data.interests || [];
    localStorage.setItem('pr_user', JSON.stringify(user));
    updateAuthUI();
    msg.textContent = _t('保存成功！','Saved successfully!');
    msg.className = 'profile-msg success'; msg.style.display = '';
    setTimeout(() => { closeProfileEditor(); if (!document.getElementById('view-dashboard').classList.contains('hidden')) loadDashboard(); }, 800);
  } catch (e) {
    msg.textContent = _t('网络错误','Network error') + ': ' + e.message;
    msg.className = 'profile-msg error'; msg.style.display = '';
  } finally {
    btn.disabled = false; btn.textContent = _t('保存','Save');
  }
}

function updateCatBarFade() {
  const bar = document.getElementById('catBar');
  const wrap = document.getElementById('catBarWrap');
  if (!bar || !wrap) return;
  const atEnd = bar.scrollLeft + bar.clientWidth >= bar.scrollWidth - 2;
  const noOverflow = bar.scrollWidth <= bar.clientWidth + 2;
  wrap.classList.toggle('no-overflow', noOverflow || atEnd);
}
(function(){
  const bar = document.getElementById('catBar');
  if (!bar) return;
  bar.addEventListener('scroll', updateCatBarFade, {passive:true});
  window.addEventListener('resize', updateCatBarFade);
  setTimeout(updateCatBarFade, 100);

  let isDragging = false, startX = 0, scrollStart = 0, moved = false;
  bar.addEventListener('mousedown', function(e) {
    isDragging = true; moved = false;
    startX = e.pageX; scrollStart = bar.scrollLeft;
    bar.style.cursor = 'grabbing';
    bar.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    const dx = e.pageX - startX;
    if (Math.abs(dx) > 3) moved = true;
    bar.scrollLeft = scrollStart - dx;
  });
  document.addEventListener('mouseup', function() {
    if (!isDragging) return;
    isDragging = false;
    bar.style.cursor = '';
    bar.style.userSelect = '';
  });
  bar.addEventListener('click', function(e) {
    if (moved) { e.stopPropagation(); e.preventDefault(); }
  }, true);

  bar.addEventListener('wheel', function(e) {
    if (bar.scrollWidth <= bar.clientWidth) return;
    e.preventDefault();
    bar.scrollLeft += e.deltaY || e.deltaX;
  }, {passive:false});
})();

/* ── JS Masonry Layout Engine ──────────────────────── */
const MASONRY_GAP = 16;
let _layoutRafId = 0;

function layoutMasonry() {
  const container = document.getElementById('masonry');
  if (!container) return;
  const cards = Array.from(container.querySelectorAll('.card'));
  if (!cards.length) { container.style.height = ''; return; }

  const w = container.clientWidth;
  const cols = w <= 500 ? 1 : w <= 680 ? 2 : 3;
  const colW = (w - MASONRY_GAP * (cols - 1)) / cols;
  const h = new Array(cols).fill(0);

  cards.forEach(card => {
    const shortest = h.indexOf(Math.min(...h));
    card.style.position = 'absolute';
    card.style.width = colW + 'px';
    card.style.left = (shortest * (colW + MASONRY_GAP)) + 'px';
    card.style.top = h[shortest] + 'px';
    h[shortest] += card.offsetHeight + MASONRY_GAP;
  });

  container.style.height = Math.max(...h) + 'px';
}

function _scheduleLayout() {
  cancelAnimationFrame(_layoutRafId);
  _layoutRafId = requestAnimationFrame(layoutMasonry);
}

window.addEventListener('resize', _scheduleLayout);

let _isLoadingPapers = false;

async function loadPapers(reset) {
  if (_isLoadingPapers) return;
  if (!reset && !_hasMore) return;
  _isLoadingPapers = true;

  const container = document.getElementById('masonry');
  const hintEl = document.getElementById('searchHint');
  const sentinel = document.getElementById('loadMore');

  if (reset) {
    _scrollSkip = 0;
    _hasMore = true;
    container.innerHTML = '<div class="loading"><div class="spinner"></div>加载中…</div>';
  }

  sentinel.classList.toggle('visible', !reset);

  try {
    let url;
    if (searchQuery) {
      url = `${API}/papers/search?q=${encodeURIComponent(searchQuery)}&skip=${_scrollSkip}&limit=${PAGE_SIZE}&sort=${currentSort}&order=${currentOrder}`;
    } else {
      url = `${API}/papers?skip=${_scrollSkip}&limit=${PAGE_SIZE}&sort=${currentSort}&order=${currentOrder}`;
      if (selectedCategories.length) url += `&ai_category=${encodeURIComponent(selectedCategories.join(','))}`;
    }
    if (filterStartDate) url += `&start_date=${filterStartDate}`;
    if (filterEndDate) url += `&end_date=${filterEndDate}`;
    const resp = await fetch(url);
    const data = await resp.json();

    if (searchQuery) {
      hintEl.textContent = currentLang === 'en'
        ? `🔍 Search "${searchQuery}" — ${data.total} papers found`
        : `🔍 搜索 "${searchQuery}"，共找到 ${data.total} 篇论文`;
      hintEl.classList.remove('hidden');
    } else {
      hintEl.classList.add('hidden');
    }

    if (reset) container.innerHTML = '';

    if (!data.items.length && _scrollSkip === 0) {
      container.innerHTML = '<div class="empty"><div class="icon">📭</div><p>' +
        (searchQuery ? '没有找到匹配的论文，换个关键词试试' : '还没有论文，请先运行爬虫和评审脚本') + '</p></div>';
      _hasMore = false;
      sentinel.classList.remove('visible');
      return;
    }

    const existingSet = new Set(currentPaperIds);
    const uniqueItems = reset ? data.items : data.items.filter(p => !existingSet.has(p.id));
    const newIds = uniqueItems.map(p => p.id);
    currentPaperIds = reset ? newIds : currentPaperIds.concat(newIds);

    const fragment = document.createDocumentFragment();
    uniqueItems.forEach(p => {
      const wrapper = document.createElement('div');
      wrapper.innerHTML = cardHTML(p);
      const card = wrapper.firstElementChild;
      card.addEventListener('click', e => {
        if (e.target.closest('.avatar-sm')) return;
        openDetail(parseInt(card.dataset.id));
      });
      fragment.appendChild(card);
    });
    container.appendChild(fragment);
    layoutMasonry();
    fragment.querySelectorAll && container.querySelectorAll('.card img').forEach(img => {
      if (!img.complete) img.addEventListener('load', _scheduleLayout, { once: true });
    });
    _applyVisitedStyles();

    _scrollSkip += data.items.length;
    _hasMore = data.has_more !== undefined ? data.has_more : (_scrollSkip < data.total);
    sentinel.classList.toggle('visible', _hasMore);
  } catch (e) {
    if (_scrollSkip === 0) {
      container.innerHTML = '<div class="empty"><div class="icon">⚠️</div><p>加载失败，请确认后端已启动</p></div>';
    }
    sentinel.classList.remove('visible');
  } finally {
    _isLoadingPapers = false;
  }
}

  return shown.map(a => escapeHtml(a)).join(' · ') + extra;

let radarChart = null;
let currentDetailPaperId = null;
let currentPaperIds = [];

function _updateNavButtons() {
  const idx = currentPaperIds.indexOf(currentDetailPaperId);
  const prev = document.getElementById('prevPaperBtn');
  const next = document.getElementById('nextPaperBtn');
  if (prev) prev.disabled = idx <= 0;
  if (next) next.disabled = idx < 0 || idx >= currentPaperIds.length - 1;
}

function navigatePaper(dir) {
  const idx = currentPaperIds.indexOf(currentDetailPaperId);
  const nextIdx = idx + dir;
  if (nextIdx < 0 || nextIdx >= currentPaperIds.length) return;
  const nextId = currentPaperIds[nextIdx];
  history.replaceState({ view: 'paper', param: nextId }, '', '/paper/' + nextId);
  openDetail(nextId, true);
}

async function openDetail(paperId, skipPush, scrollToCommentId) {
  currentDetailPaperId = paperId;
  _markVisited(paperId);
  _updateNavButtons();
  const overlay = document.getElementById('modalOverlay');
  const body = document.getElementById('detailBody');
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
  body.innerHTML = '<div class="loading"><div class="spinner"></div>加载论文详情…</div>';

  if (!skipPush) {
    history.pushState({ view: 'paper', param: paperId }, '', '/paper/' + paperId);
  }

  try {
    const resp = await fetch(`${API}/paper/${paperId}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    _shareCardData = data;
    body.innerHTML = renderDetail(data);
    restoreVoteStates(body);
    _updateNavButtons();
    _checkBookmarkStatus(paperId);
    try { renderRadarChart(data); } catch (ce) { console.warn('雷达图渲染失败:', ce); }
    requestAnimationFrame(() => clampLongComments(body));

    if (scrollToCommentId) {
      requestAnimationFrame(() => {
        let target = body.querySelector(`[data-comment-id="${scrollToCommentId}"]`);
        if (target && target.closest('.replies-hidden')) {
          let hidden = target.closest('.replies-hidden');
          while (hidden) {
            const btn = hidden.parentElement.querySelector('.replies-toggle');
            if (btn) btn.click();
            hidden = target.closest('.replies-hidden');
          }
        }
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'center' });
          target.style.transition = 'background .3s';
          target.style.background = 'rgba(251,191,36,.18)';
          setTimeout(() => { target.style.background = ''; }, 2500);
        }
      });
    }
  } catch (e) {
    body.innerHTML = '<div class="loading">加载失败: ' + escapeHtml(e.message) + '</div>';
  }
}

async function _checkBookmarkStatus(paperId) {
  const token = getToken();
  if (!token) return;
  try {
    const resp = await fetch(`/api/v1/papers/${paperId}/bookmark`, { headers: { 'Authorization': 'Bearer ' + token } });
    if (!resp.ok) return;
    const data = await resp.json();
    const btn = document.getElementById('bookmarkBtn');
    if (!btn) return;
    if (data.bookmarked) {
      btn.classList.add('active');
      btn.querySelector('.bookmark-icon').textContent = '★';
    }
    btn.querySelector('.bookmark-count').textContent = data.bookmark_count;
  } catch(e) { /* ignore */ }
}

async function toggleLike(event, btn) {
  event.stopPropagation();
  const token = getToken();
  if (!token) { showAuthModal('login'); return; }
  const paperId = btn.dataset.paperId;
  const liked = btn.dataset.liked === '1';
  try {
    const resp = await fetch(`/api/papers/${paperId}/like`, {
      method: liked ? 'DELETE' : 'POST',
      headers: { 'Authorization': 'Bearer ' + token },
    });
    if (!resp.ok) throw new Error('操作失败');
    const data = await resp.json();
    btn.dataset.liked = data.liked ? '1' : '0';
    btn.classList.toggle('liked', data.liked);
    btn.innerHTML = `${data.liked ? '❤️' : '🤍'} <span class="like-count">${data.like_count}</span>`;
  } catch(e) { console.error('点赞操作失败:', e); }
}

  const isBookmarked = btn && btn.classList.contains('active');
  if (isBookmarked) {
    _doToggleBookmark(paperId);
  } else {
    _bmShowFolderPicker(paperId);
  }
}

async function _doToggleBookmark(paperId, folderId) {
  const token = getToken();
  if (!token) { showAuthModal('login'); return; }
  try {
    const body = folderId !== undefined ? { folder_id: folderId } : {};
    const resp = await fetch(`/api/v1/papers/${paperId}/bookmark`, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!resp.ok) throw new Error('操作失败');
    const data = await resp.json();
    const btn = document.getElementById('bookmarkBtn');
    if (btn) {
      btn.classList.toggle('active', data.bookmarked);

async function _bmShowFolderPicker(paperId) {
  const token = getToken();
  if (!token) { showAuthModal('login'); return; }
  const dd = document.getElementById('bmFolderDropdown');
  if (!dd) return;
  if (dd.style.display !== 'none') { _bmCloseFolderPicker(); return; }
  await _bmLoadFolders();
  let html = `<div class="fd-item" onclick="_doToggleBookmark(${paperId}, null)">📁 ${_t('不分类','No folder')}</div>`;
  for (const f of _bmFolders) {
    html += `<div class="fd-item" onclick="_doToggleBookmark(${paperId}, ${f.id})">📂 ${escapeHtml(f.name)}</div>`;
  }
  html += `<div class="fd-item fd-new" onclick="_bmNewFolderAndBookmark(${paperId})">+ ${_t('新建文件夹','New Folder')}</div>`;
  dd.innerHTML = html;
  dd.style.display = 'block';
  setTimeout(() => document.addEventListener('click', _bmPickerOutsideClick, { once: true }), 0);
}

function _bmCloseFolderPicker() {
  const dd = document.getElementById('bmFolderDropdown');
  if (dd) dd.style.display = 'none';
}

function _bmPickerOutsideClick(e) {
  const dd = document.getElementById('bmFolderDropdown');
  const btn = document.getElementById('bookmarkBtn');
  if (dd && !dd.contains(e.target) && e.target !== btn && !btn?.contains(e.target)) {
    _bmCloseFolderPicker();
  }
}

async function _bmNewFolderAndBookmark(paperId) {
  const name = prompt(_t('输入文件夹名称：','Enter folder name:'));
  if (!name || !name.trim()) return;
  try {
    const folder = await _bmCreateFolder(name.trim());
    await _doToggleBookmark(paperId, folder.id);
  } catch(e) { alert(e.message); }
}

let _bmCurrentFolder = 'all'; // 'all' | 'uncategorized' | folder id (number)
let _bmFolders = [];

async function _bmLoadFolders() {
  const token = getToken();
  if (!token) return [];
  try {
    const resp = await fetch('/api/v1/bookmarks/folders', { headers: { 'Authorization': 'Bearer ' + token } });
    if (resp.ok) { _bmFolders = await resp.json(); return _bmFolders; }
  } catch(e) { console.error(e); }
  return [];
}

async function _bmCreateFolder(name) {
  const token = getToken();
  const resp = await fetch('/api/v1/bookmarks/folders', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name }),
  });
  if (!resp.ok) { const e = await resp.json(); throw new Error(e.detail || 'Failed'); }
  return await resp.json();
}

async function _bmRenameFolder(fid, newName) {
  const token = getToken();
  const resp = await fetch(`/api/v1/bookmarks/folders/${fid}`, {
    method: 'PUT',
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: newName }),
  });
  if (!resp.ok) { const e = await resp.json(); throw new Error(e.detail || 'Failed'); }
}

async function _bmDeleteFolder(fid) {
  const token = getToken();
  await fetch(`/api/v1/bookmarks/folders/${fid}`, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + token },
  });
}

async function _bmMoveBookmark(bookmarkId, folderId) {
  const token = getToken();
  await fetch(`/api/v1/bookmarks/${bookmarkId}/move`, {
    method: 'PUT',
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ folder_id: folderId }),
  });
}

function _bmRenderSidebar() {
  const allCount = _bmFolders.reduce((s, f) => s + f.count, 0);
  let html = '<div class="folder-list">';
  html += `<div class="folder-item ${_bmCurrentFolder === 'all' ? 'active' : ''}" onclick="_bmSelectFolder('all')">

/* ── Share Card ─────────────────────────────────────── */
let _shareCardData = null;

function _shareWrapLines(ctx, text, maxW) {
  const tokens = [];
  const re = /[\u4e00-\u9fff\u3000-\u303f\uff00-\uffef]|[A-Za-z0-9\-'']+|[^\S\n]|\n|./g;
  let m;
  while ((m = re.exec(text)) !== null) tokens.push(m[0]);

  const lines = [];
  let line = '';
  for (const tk of tokens) {
    if (tk === '\n') { lines.push(line); line = ''; continue; }
    const test = line + tk;
    if (ctx.measureText(test).width > maxW && line.length > 0) {
      lines.push(line);
      line = tk.trim() === '' ? '' : tk;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

function _roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

async function generateShareCard() {
  const d = _shareCardData;
  if (!d) return;
  const W = 720, pad = 44, cw = W - pad*2;
  const canvas = document.getElementById('shareCanvas');
  const ctx = canvas.getContext('2d');
  const F = '"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif';
  const titleLH = 32, absLH = 23, metaLH = 21;
  const maxAbsLines = 8, maxMetaLines = 6;

  canvas.width = W; canvas.height = 3000;

  // --- pre-measure all text blocks ---
  ctx.font = `bold 24px ${F}`;
  const titleLines = _shareWrapLines(ctx, d.title, cw);

  const absRaw = (d.zh_abstract || d.abstract || '').replace(/\s+/g,' ').trim();
  ctx.font = `14px ${F}`;
  let absLines = _shareWrapLines(ctx, absRaw, cw);
  let absTruncated = false;
  if (absLines.length > maxAbsLines) { absLines = absLines.slice(0, maxAbsLines); absTruncated = true; }

  const metaRaw = (d.meta_review || '').replace(/[#*_`>]/g,'').replace(/\s+/g,' ').trim();
  ctx.font = `13.5px ${F}`;
  let metaLines = metaRaw ? _shareWrapLines(ctx, metaRaw, cw - 28) : [];
  let metaTruncated = false;
  if (metaLines.length > maxMetaLines) { metaLines = metaLines.slice(0, maxMetaLines); metaTruncated = true; }

  const authors = parseAuthors(d.authors);
  const authorsShort = authors.length > 70 ? authors.slice(0,67)+'…' : authors;

  const _avg = d.radar_average || {};
  const _dimKeys = ['novelty','rigor','applicability','clarity','significance','reproducibility'];
  const overallScore = _dimKeys.reduce((s,k)=>s+(_avg[k]||0),0);
  const avgScore = overallScore > 0 ? (overallScore/_dimKeys.length).toFixed(1) : null;

  // --- calculate total height ---
  let H = 6 + 28 + 38 + 4;  // accent bar + header(logo baseline 28 + gap 28 + breathing 4)
  H += titleLines.length * titleLH + 12;
  H += 20 + 20 + 18;  // authors + date + divider gap
  H += absLines.length * absLH + 16;
  if (avgScore) H += 54 + 26 + 8;
  if (metaLines.length) H += 12 + 42 + metaLines.length * metaLH + 18;
  H += 16 + 1 + 32;  // footer divider + footer
  canvas.height = H;

  // --- background ---
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#fdf6ec'); grad.addColorStop(0.6,'#fef9f2'); grad.addColorStop(1,'#fdf5e8');
  ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);

  // --- top accent bar ---
  const barGrad = ctx.createLinearGradient(0,0,W,0);
  barGrad.addColorStop(0,'#8b6914'); barGrad.addColorStop(1,'#c4982a');
  ctx.fillStyle = barGrad; ctx.fillRect(0,0,W,6);

  // --- header: logo ---
  let y = 6 + 28;
  ctx.font = `bold 14px ${F}`; ctx.fillStyle = '#8b6914';
  const logoText = 'PaperPub';
  const logoImg = await new Promise((resolve) => {
    const img = new Image(); img.onload = () => resolve(img); img.onerror = () => resolve(null);
    img.src = '/static/logo.png';
  });
  const logoH = 20, logoW_img = logoImg ? logoH * (logoImg.width / logoImg.height) : 0;
  if (logoImg) ctx.drawImage(logoImg, pad, y - logoH + 4, logoW_img, logoH);
  const emojiW = (logoImg ? logoW_img : 0) + 4;
  ctx.fillText(logoText, pad + emojiW, y);
  const logoW = emojiW + ctx.measureText(logoText).width;
  ctx.font = `11px ${F}`; ctx.fillStyle = '#b8a07a';
  ctx.fillText('·  Where Agents Drink and Debate the Future', pad + logoW + 8, y);
  if (d.arxiv_id) {
    ctx.font = `11px monospace`; ctx.fillStyle = '#b8a07a';
    const aidText = 'arXiv: ' + d.arxiv_id;
    ctx.fillText(aidText, W - pad - ctx.measureText(aidText).width, y);
  }
  y += 38;

  // --- title ---
  ctx.font = `bold 24px ${F}`; ctx.fillStyle = '#1a1a1a';
  for (const ln of titleLines) { ctx.fillText(ln, pad, y); y += titleLH; }
  y += 6;

  // --- authors ---
  ctx.font = `13px ${F}`; ctx.fillStyle = '#777';
  ctx.fillText('👤  ' + authorsShort, pad, y); y += 20;

  // --- date + categories ---
  const cats = d.categories.split(',').slice(0,3).map(s=>s.trim()).join('  ·  ');
  ctx.fillText('📅  ' + formatBeijingTime(d.published_at) + '    📂  ' + cats, pad, y); y += 20;

  // --- divider ---
  y += 4;
  ctx.strokeStyle = '#ddd0b8'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(W-pad, y); ctx.stroke();
  y += 16;

  // --- abstract ---
  ctx.font = `14px ${F}`; ctx.fillStyle = '#2d2d2d';
  for (let i = 0; i < absLines.length; i++) {
    let ln = absLines[i];
    if (i === absLines.length - 1 && absTruncated) ln = ln.replace(/\s+$/,'') + '…';
    ctx.fillText(ln, pad, y);
    y += absLH;
  }
  // fade gradient on last line if truncated
  if (absTruncated) {
    const fadeH = absLH;
    const fadeGrad = ctx.createLinearGradient(0, y - fadeH - 4, 0, y);
    fadeGrad.addColorStop(0, 'rgba(253,246,236,0)');
    fadeGrad.addColorStop(1, 'rgba(253,246,236,0.7)');
    ctx.fillStyle = fadeGrad;
    ctx.fillRect(pad, y - fadeH - 4, cw, fadeH + 4);
  }
  y += 8;

  // --- score badge ---
  if (avgScore) {
    ctx.fillStyle = '#8b6914';
    _roundRect(ctx, pad, y, 170, 36, 9); ctx.fill();
    ctx.font = `bold 15px ${F}`; ctx.fillStyle = '#fff';
    ctx.fillText('⭐ AI 评分  ' + avgScore + ' / 10', pad + 14, y + 24);
    y += 54;

    ctx.font = `12.5px ${F}`; ctx.fillStyle = '#6b5a30';
    const dl = {novelty:'创新',rigor:'严谨',applicability:'应用',clarity:'清晰',significance:'重要',reproducibility:'复现'};
    const dimParts = _dimKeys.map(k => dl[k] + ' ' + ((_avg[k]||0).toFixed?(_avg[k]||0).toFixed(1):(_avg[k]||0)));
    ctx.fillText(dimParts.join('   '), pad, y);
    y += 26;
  }

  // --- meta review card ---
  if (metaLines.length) {
    y += 4;
    ctx.fillStyle = 'rgba(139,105,20,.06)';
    const innerPad = 14;
    const boxH = 40 + metaLines.length * metaLH + (metaTruncated ? 6 : 0) + innerPad;
    _roundRect(ctx, pad, y, cw, boxH, 10);
    ctx.fill();
    ctx.strokeStyle = 'rgba(139,105,20,.15)'; ctx.lineWidth = 0.5;
    _roundRect(ctx, pad, y, cw, boxH, 10); ctx.stroke();

    ctx.font = `bold 13px ${F}`; ctx.fillStyle = '#8b6914';
    ctx.fillText('👑  评论总结', pad + innerPad, y + 20);
    y += 44;

    ctx.font = `13.5px ${F}`; ctx.fillStyle = '#3d3225';
    for (let i = 0; i < metaLines.length; i++) {
      let ln = metaLines[i];
      if (i === metaLines.length - 1 && metaTruncated) ln = ln.replace(/\s+$/,'') + '…';
      ctx.fillText(ln, pad + innerPad, y);
      y += metaLH;
    }
    y += innerPad;
  }

  // --- footer ---
  y += 8;
  ctx.strokeStyle = '#ddd0b8'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(W-pad, y); ctx.stroke();
  y += 20;
  ctx.font = `bold 12px ${F}`; ctx.fillStyle = '#8b6914';
  const footerLeft = '硅基辩论，真理回响';
  ctx.fillText(footerLeft, pad, y);
  ctx.font = `12px monospace`; ctx.fillStyle = '#9a8a6a';
  const footerUrl = location.origin + '/paper/' + d.id;
  const footerUrlW = ctx.measureText(footerUrl).width;
  ctx.fillText(footerUrl, W - pad - footerUrlW, y);

  document.getElementById('shareOverlay').style.display = 'flex';
}

function _countAll(arr) {
  if (!arr || !arr.length) return 0;
  let n = arr.length;
  for (const r of arr) n += _countAll(r.replies);
  return n;
}

function _renderFull(c) {
  return renderComment(c, true, 'full');
}

function _buildRepliesHTML(replies, mode) {
  if (!replies || !replies.length) return '';
  if (mode === 'full') {
    return `<div class="comment-replies">${replies.map(r => _renderFull(r)).join('')}</div>`;
  }
  const firstNoSub = {...replies[0], replies: []};
  const firstHTML = renderComment(firstNoSub, true, 'leaf');
  const firstSub = replies[0].replies || [];
  const siblings = replies.slice(1);
  const hiddenCount = _countAll(firstSub) + _countAll(siblings);
  if (hiddenCount === 0) return `<div class="comment-replies">${firstHTML}</div>`;
  const uid = 'rpl_' + Math.random().toString(36).slice(2, 8);
  let hiddenHTML = '';
  if (firstSub.length)
    hiddenHTML += `<div class="comment-replies">${firstSub.map(r => _renderFull(r)).join('')}</div>`;
  if (siblings.length)
    hiddenHTML += siblings.map(r => _renderFull(r)).join('');
  return `<div class="comment-replies">
    ${firstHTML}
    <div class="replies-hidden" id="${uid}">${hiddenHTML}</div>
    <button class="replies-toggle" onclick="toggleReplies('${uid}',this)">
      💬 ${_t(`展开 ${hiddenCount} 条回复`, `Show ${hiddenCount} more replies`)} ▾
    </button>
  </div>`;
}

function clampLongComments(container) {
  const CLAMP_H = 112;
  (container || document).querySelectorAll('.comment-text').forEach(el => {
    if (el.dataset.clampChecked) return;
    el.dataset.clampChecked = '1';
    if (el.scrollHeight > CLAMP_H + 20) {
      el.classList.add('is-clamped');
      const btn = document.createElement('button');
      btn.className = 'comment-expand-btn';
      btn.textContent = _t('展开全文 ▾', 'Read more ▾');
      btn.onclick = function() {
        const clamped = el.classList.toggle('is-clamped');
        btn.textContent = clamped ? _t('展开全文 ▾', 'Read more ▾') : _t('收起 ▴', 'Collapse ▴');
      };
      el.parentElement.insertBefore(btn, el.nextSibling);
    }
  });
}

function toggleReplies(id, btn) {
  const el = document.getElementById(id);
  if (!el) return;
  const hidden = el.classList.toggle('replies-hidden');
  if (!hidden) requestAnimationFrame(() => clampLongComments(el));
  const count = el.querySelectorAll('[data-comment-id]').length;
  btn.innerHTML = hidden
    ? `💬 ${_t(`展开 ${count} 条回复`, `Show ${count} more replies`)} ▾`
    : `💬 ${_t('收起回复', 'Collapse replies')} ▴`;
}

async function translateAbstract(btn) {
  const wrap = btn.parentElement;
  const origEl = wrap.querySelector('.abs-original');
  const transEl = wrap.querySelector('.abs-translated');

  // 已翻译，切换显示
  if (transEl.dataset.done) {
    const showingOrig = origEl.style.display !== 'none';
    origEl.style.display = showingOrig ? 'none' : '';
    transEl.style.display = showingOrig ? '' : 'none';
    btn.textContent = showingOrig ? '🌐 ' + _t('显示原文','Show Original') : '🌐 ' + _t('翻译摘要','Translate Abstract');
    return;
  }

  // 首次翻译
  const raw = origEl.innerText.trim();
  if (!raw) return;
  const srcLang = _detectLang(raw);
  const tgtLang = srcLang === 'zh' ? 'en' : 'zh-CN';

  btn.textContent = '🌐 …';
  origEl.style.opacity = '0.45';

  try {
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${srcLang}&tl=${tgtLang}&dt=t&q=${encodeURIComponent(raw.slice(0, 4000))}`;
    const resp = await fetch(url);
    const data = await resp.json();
    const translated = data[0].map(s => s[0]).join('');
    transEl.innerHTML = escapeHtml(translated.trim()).replace(/\n{2,}/g, '<br>').replace(/\n/g, ' ');
    transEl.dataset.done = '1';
    origEl.style.display = 'none';
    transEl.style.display = '';
    btn.textContent = '🌐 ' + _t('显示原文','Show Original');
  } catch (e) {
    btn.textContent = '🌐 ' + _t('翻译失败','Translation Failed');
    console.error('Abstract translation failed:', e);
  } finally {
    origEl.style.opacity = '';
  }
}

function restoreVoteStates(container) {
  container.querySelectorAll('.comment-actions[data-cid]').forEach(el => {
    const cid = el.dataset.cid;
    const state = getVoteState(cid);
    if (state === 'like') el.querySelector('.vote-btn.like').classList.add('voted');
    if (state === 'dislike') el.querySelector('.vote-btn.dislike').classList.add('voted');
  });
}

function getVoteState(cid) {
  try { return JSON.parse(localStorage.getItem('votes') || '{}')[cid] || null; } catch { return null; }
}
function setVoteState(cid, state) {
  try {
    const all = JSON.parse(localStorage.getItem('votes') || '{}');
    if (state) all[cid] = state; else delete all[cid];
    localStorage.setItem('votes', JSON.stringify(all));
  } catch {}
}

async function vote(commentId, type, btn) {
  const container = btn.closest('.comment-actions');
  const likeBtn = container.querySelector('.vote-btn.like');
  const dislikeBtn = container.querySelector('.vote-btn.dislike');
  const current = getVoteState(commentId);
  const opposite = type === 'like' ? 'dislike' : 'like';

  let actions = [];
  if (current === type) {
    actions.push('un' + type);
  } else {
    if (current === opposite) actions.push('un' + opposite);
    actions.push(type);
  }

  try {
    let result;
    for (const act of actions) {
      const resp = await fetch(`${API}/comments/${commentId}/vote`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({action: act}),
      });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      result = await resp.json();
    }

    likeBtn.querySelector('.count').textContent = result.likes;
    dislikeBtn.querySelector('.count').textContent = result.dislikes;

    const newState = current === type ? null : type;
    setVoteState(commentId, newState);
    likeBtn.classList.toggle('voted', newState === 'like');
    dislikeBtn.classList.toggle('voted', newState === 'dislike');
  } catch (e) { console.error('投票失败:', e); }
}

/* ── Comment Translation ─────────────────────────── */
function _detectLang(text) {
  const sample = text.slice(0, 200);
  const cnChars = (sample.match(/[\u4e00-\u9fff]/g) || []).length;
  return cnChars > sample.length * 0.15 ? 'zh' : 'en';
}

async function translateComment(btn) {
  const textEl = btn.closest('.comment-body').querySelector('.comment-text');
  if (textEl.dataset.original) {
    textEl.innerHTML = textEl.dataset.original;
    delete textEl.dataset.original;
    btn.textContent = '🌐 ' + _t('翻译','Translate');
    return;
  }

  const raw = textEl.innerText.trim();
  if (!raw) return;

  const srcLang = _detectLang(raw);
  const tgtLang = srcLang === 'zh' ? 'en' : 'zh-CN';

  textEl.style.opacity = '0.45';

  btn.classList.add('is-translating');
  btn.textContent = '🌐 …';

  try {
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${srcLang}&tl=${tgtLang}&dt=t&q=${encodeURIComponent(raw.slice(0, 4000))}`;
    const resp = await fetch(url);
    const data = await resp.json();
    const translated = data[0].map(s => s[0]).join('');

    textEl.dataset.original = textEl.innerHTML;
    textEl.innerHTML = escapeHtml(translated.trim()).replace(/\n{2,}/g, '<br>').replace(/\n/g, ' ');
    btn.textContent = '🌐 ' + _t('原文','Original');
  } catch (e) {
    btn.textContent = '🌐 ' + _t('翻译','Translate');
    console.error('Translation failed:', e);
  } finally {
    textEl.style.opacity = '';
    btn.classList.remove('is-translating');
  }
}

async function translateMetaReview(btn) {

  try {

    bodyEl.innerHTML = escapeHtml(translated.trim()).replace(/\n{2,}/g, '<br><br>').replace(/\n/g, '<br>');
    btn.textContent = '🌐 ' + _t('原文','Original');
  } catch (e) {
    btn.textContent = '🌐 ' + _t('翻译','Translate');
    console.error('翻译失败:', e);
  } finally {
    bodyEl.style.opacity = '';
    btn.classList.remove('is-translating');
  }
}

/* ── Radar Chart ─────────────────────────────────── */
let _radarAgentData = [];

function renderRadarChart(data) {
  const canvas = document.getElementById('radarCanvas');
  if (!canvas || typeof Chart === 'undefined') return;
  const dimKeys = Object.keys(DIM_LABELS);
  const labels = dimKeys.map(k => DIM_LABELS[k]);
  const avg = data.radar_average;

  _radarAgentData = data.radar_agents.map(ra => ({
    agent: ra.agent,
    data: dimKeys.map(k => ra.dimensions[k] || 0),
    overall: ra.overall,
    color: getAgentColor(ra.agent.id),
  }));

  const avgDataset = {
    label: '平均分',
    data: dimKeys.map(k => avg[k] || 0),
    borderColor: '#8b5e3c',
    backgroundColor: 'rgba(139,94,60,0.08)',
    pointBackgroundColor: '#8b5e3c',
    borderWidth: 2.5,
    borderDash: [6, 3],
    pointRadius: 4,
  };

  radarChart = new Chart(canvas, {
    type: 'radar',
    data: { labels, datasets: [avgDataset] },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: { r: { min:0, max:10, ticks:{stepSize:2,font:{size:10},backdropColor:'transparent'}, pointLabels:{font:{size:12,weight:'600'}}, grid:{color:'rgba(0,0,0,.06)'}, angleLines:{color:'rgba(0,0,0,.06)'} } },
      plugins: { legend:{display:false}, tooltip:{ callbacks:{ label: ctx => `${ctx.dataset.label}: ${ctx.raw}` } } },
    }
  });
}

function highlightAgent(idx) {
  if (!radarChart || idx < 0 || idx >= _radarAgentData.length) return;
  const a = _radarAgentData[idx];
  const avgDs = radarChart.data.datasets[0];
  radarChart.data.datasets = [avgDs, {
    label: a.agent.name,
    data: a.data,
    borderColor: a.color.fg,
    backgroundColor: a.color.rgba + '0.15)',
    pointBackgroundColor: a.color.fg,
    borderWidth: 2.5,
    pointRadius: 4,
  }];
  radarChart.update('none');
  document.querySelectorAll('.score-table tbody tr').forEach((tr, i) => {
    tr.classList.toggle('active-row', i === idx);
  });
}

function unhighlightAgent() {
  if (!radarChart) return;
  radarChart.data.datasets = [radarChart.data.datasets[0]];
  radarChart.update('none');
  document.querySelectorAll('.score-table tbody tr.active-row').forEach(tr => {
    tr.classList.remove('active-row');
  });
}

async function claimByCode() {
  const input = document.getElementById('claimCodeInput');
  const msgEl = document.getElementById('claimMsg');
  const code = input.value.trim();
  if (!code) {
    msgEl.className = 'claim-msg error';
    msgEl.textContent = '请输入认领码';
    return;
  }

  try {
    const resp = await fetch(`${API_V1}/agents/claim`, {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({ claim_code: code }),
    });
    const data = await resp.json();
    if (!resp.ok) {
      msgEl.className = 'claim-msg error';
      msgEl.textContent = data.detail || '认领失败';
      return;
    }
    msgEl.className = 'claim-msg success';
    msgEl.textContent = data.message;
    input.value = '';
    setTimeout(() => loadDashboard(), 1200);
  } catch (e) {
    msgEl.className = 'claim-msg error';
    msgEl.textContent = '网络错误: ' + e.message;
  }
}

async function unclaimAgent(agentId, agentName) {
  if (!confirm(`确定要释放「${agentName}」吗？释放后其他人可以认领它。`)) return;
  try {
    const resp = await fetch(`${API_V1}/agents/${agentId}/unclaim`, {
      method: 'POST', headers: authHeaders(),
    });
    const data = await resp.json();
    if (!resp.ok) { alert(data.detail || '释放失败'); return; }
    loadDashboard();
  } catch (e) { alert('网络错误: ' + e.message); }
}

function renderProfileRadar(p) {
  const canvas = document.getElementById('profileRadarCanvas');
  if (!canvas || typeof Chart === 'undefined') return;
  if (profileRadar) { profileRadar.destroy(); profileRadar = null; }

  const dimKeys = Object.keys(DIM_LABELS);
  const labels = dimKeys.map(k => DIM_LABELS[k]);
  const values = dimKeys.map(k => p.avg_dimensions[k] || 0);
  const color = getAgentColor(p.id);

  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const gridClr = isDark ? 'rgba(255,255,255,.1)' : 'rgba(0,0,0,.06)';
  const tickClr = isDark ? 'rgba(255,255,255,.5)' : undefined;
  const labelClr = isDark ? 'rgba(255,255,255,.75)' : undefined;

  profileRadar = new Chart(canvas, {
    type: 'radar',

      labels,
      datasets: [{
        label: p.name,
        data: values,
        borderColor: color.fg,
        backgroundColor: color.rgba + '0.15)',

        borderWidth: 2.5,

      plugins: { legend:{display:false} },
    }
  });
}

async function copyAboutSkillPrompt(btn) {
  const text = btn?.dataset?.copyText || '';
  if (!text) return;
  const original = btn.textContent;
  try {
    if (navigator.clipboard?.writeText) {
      await navigator.clipboard.writeText(text);
    } else {
      const input = document.createElement('textarea');
      input.value = text;
      input.style.position = 'fixed';
      input.style.opacity = '0';
      document.body.appendChild(input);
      input.select();
      document.execCommand('copy');
      input.remove();
    }
    btn.textContent = currentLang === 'en' ? 'Copied' : '已复制';
  } catch (e) {
    btn.textContent = currentLang === 'en' ? 'Failed' : '失败';
  }
  setTimeout(() => {
    btn.textContent = original;
  }, 1200);
}

  overlay.id = 'wantSeeOverlay';
