<style>
/* ── Reset & Base ────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --red:#8b5e3c;--red-light:#f5ebe0;--red-dark:#6b4226;
  --bg:#f5f5f7;--card:#fff;--text:#1a1a1a;--muted:#888;--border:#e5e5e5;
  --blue:#5a7fa0;--orange:#d4a574;--purple:#8b6e9b;--green:#6b8e5a;
  --radius:16px;--shadow:0 2px 16px rgba(0,0,0,.06);
  --accent:#8b5e3c;
  --header-bg:#3d2817;
  --card-hover-shadow:0 4px 20px rgba(0,0,0,.1);
}
[data-theme="dark"]{
  --bg:#0f111a;--card:#1a1d2e;--text:#e8eaed;--muted:#9aa0a6;--border:#303340;
  --red-light:#2a1f14;--shadow:0 2px 16px rgba(0,0,0,.4);
  --header-bg:#1a0f05;
  --card-hover-shadow:0 4px 20px rgba(0,0,0,.5);
  --accent:#d4a574;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB",
"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;
transition:background .3s,color .3s}
html,body{max-width:100%;overflow-x:hidden}
a{color:var(--red);text-decoration:none}
a:hover{text-decoration:underline}

.theme-toggle{
  background:transparent;border:none;border-radius:8px;
  width:34px;height:34px;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;color:rgba(255,255,255,.55);
}
.theme-toggle:hover{background:rgba(255,255,255,.1);color:#f5e6d3}

/* ── Header ──────────────────────────────────────── */
.header{
  position:sticky;top:0;z-index:100;
  background:var(--header-bg);
  border-bottom:2px solid rgba(212,165,116,.25);padding:0 24px;
  display:flex;align-items:center;height:56px;
  box-shadow:0 2px 12px rgba(61,40,23,.15);
}
.header .logo{font-size:22px;font-weight:800;color:#d4a574;letter-spacing:-.5px;cursor:pointer;display:flex;align-items:center}
.header .logo span{color:#f5e6d3}
.logo-img{height:28px;width:auto;margin-right:6px;vertical-align:middle}
.hero-logo-img{height:42px;width:auto;vertical-align:middle;margin-right:6px}
.about-logo-img{height:128px;width:auto;display:block;margin:0 auto 14px}
.header .subtitle{margin-left:12px;font-size:12px;color:rgba(245,230,211,.45);font-style:italic}
.header-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.header-btn{
  padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;
  border:none;cursor:pointer;transition:all .2s;
}
.btn-outline{background:transparent;color:#d4a574;border:1px solid rgba(212,165,116,.35)}
.btn-outline:hover{background:rgba(212,165,116,.12)}
.btn-primary{background:#d4a574;color:#3d2817}
.btn-primary:hover{background:#c4713b;color:#fff}
.btn-secondary{background:transparent;color:rgba(245,230,211,.55);font-weight:500}
.btn-secondary:hover{background:rgba(255,255,255,.08);color:#f5e6d3}
.user-pill{
  display:flex;align-items:center;gap:8px;padding:4px 14px 4px 8px;
  border-radius:20px;background:rgba(212,165,116,.12);color:#d4a574;
  font-size:13px;font-weight:600;cursor:pointer;border:1px solid rgba(212,165,116,.25);
}
.user-pill .user-avatar{width:28px;height:28px;border-radius:50%;background:#d4a574;
  color:#3d2817;display:flex;align-items:center;justify-content:center;font-size:14px;overflow:hidden}
.user-dropdown{
  position:absolute;top:52px;right:24px;background:#fff;border-radius:12px;
  box-shadow:0 8px 30px rgba(0,0,0,.15);padding:8px 0;min-width:160px;display:none;z-index:150;
}
.user-dropdown.show{display:block}
.user-dropdown a,.user-dropdown button{
  display:block;width:100%;padding:10px 20px;text-align:left;
  font-size:14px;border:none;background:none;cursor:pointer;color:var(--text);
}
.user-dropdown a:hover,.user-dropdown button:hover{background:#f5f5f5;text-decoration:none}

/* ── Notification Bell ─────────────────────────────── */
.notif-bell{
  position:relative;
}
.notif-badge{
  position:absolute;top:-4px;right:-6px;min-width:16px;height:16px;
  background:#d4a574;color:#3d2817;font-size:10px;font-weight:700;
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  padding:0 4px;line-height:1;pointer-events:none;
}
.notif-panel{
  position:absolute;top:52px;right:60px;width:380px;max-height:480px;
  background:#fff;border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.18);
  display:none;z-index:160;overflow:hidden;
}
.notif-panel.show{display:flex;flex-direction:column}
.notif-header{
  padding:14px 18px;border-bottom:1px solid #f0f0f0;
  display:flex;align-items:center;justify-content:space-between;
}
.notif-header h4{font-size:15px;font-weight:700;margin:0}
.notif-header button{
  font-size:12px;color:var(--red);background:none;border:none;
  cursor:pointer;font-weight:600;
}
.notif-header button:hover{text-decoration:underline}
.notif-list{overflow-y:auto;flex:1;max-height:400px}
.notif-item{
  display:flex;gap:10px;padding:12px 18px;cursor:pointer;
  transition:background .15s;border-bottom:1px solid #f8f8f8;
}
.notif-item:hover{background:#fafafa}
.notif-item.unread{background:#fff8f8}
.notif-item .ni-avatar{
  flex-shrink:0;width:32px;height:32px;border-radius:50%;
  background:#f0f0f0;display:flex;align-items:center;justify-content:center;
  font-size:16px;
}
.notif-item .ni-body{flex:1;min-width:0}
.notif-item .ni-text{font-size:13px;color:#333;line-height:1.4}
.notif-item .ni-text strong{font-weight:700;color:#111}
.notif-item .ni-time{font-size:11px;color:#999;margin-top:2px}
.notif-item .ni-read-btn{
  flex-shrink:0;width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);
  background:none;cursor:pointer;font-size:12px;color:var(--muted);
  display:flex;align-items:center;justify-content:center;margin-top:4px;
  transition:all .15s;
}
.notif-item .ni-read-btn:hover{background:var(--red);color:#fff;border-color:var(--red)}
.notif-item .ni-dot{
  flex-shrink:0;width:8px;height:8px;border-radius:50%;
  background:var(--red);margin-top:6px;
}
.notif-empty{padding:40px 20px;text-align:center;color:#999;font-size:13px}

/* ── Recommendations Page ─────────────────────────── */
.rec-page{max-width:960px;margin:0 auto;padding:30px 16px}
.rec-page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.rec-page-header h2{font-size:22px;font-weight:700;margin:0;display:flex;align-items:center;gap:8px}
.rec-date-picker{display:flex;align-items:center;gap:10px}
.rec-date-picker input[type="date"]{
  padding:7px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;
  background:var(--card-bg);color:var(--text);cursor:pointer;
}
.rec-date-nav{display:flex;gap:4px}
.rec-date-nav button{
  padding:6px 10px;border:1px solid var(--border);border-radius:6px;
  background:var(--card-bg);color:var(--text);cursor:pointer;font-size:13px;
  transition:background .2s;
}
.rec-date-nav button:hover{background:var(--border)}
.rec-date-nav button:disabled{opacity:.4;cursor:not-allowed}
.rec-history-dates{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.rec-history-chip{
  padding:4px 12px;border-radius:16px;font-size:12px;border:1px solid var(--border);
  background:var(--card-bg);cursor:pointer;transition:all .2s;color:var(--text);
}
.rec-history-chip:hover,.rec-history-chip.active{
  background:var(--red);color:#fff;border-color:var(--red);
}
.rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.rec-paper-card{
  background:var(--card-bg);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .2s;
}
.rec-paper-card:hover{box-shadow:0 6px 24px rgba(0,0,0,.1);transform:translateY(-3px)}
.rec-paper-img{width:100%;height:160px;object-fit:cover;background:var(--bg)}
.rec-paper-img-placeholder{
  width:100%;height:160px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;font-size:36px;font-weight:700;
}
.rec-paper-body{padding:14px 16px}
.rec-paper-title{
  font-size:15px;font-weight:600;line-height:1.5;margin-bottom:8px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.rec-paper-abstract{
  font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.rec-paper-footer{display:flex;align-items:center;justify-content:space-between;font-size:12px}
.rec-paper-score{font-weight:700;color:#f59e0b;font-size:14px}
.rec-paper-cat{
  padding:3px 8px;border-radius:6px;background:var(--bg);font-size:11px;
  max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.rec-empty{text-align:center;padding:60px 20px;color:var(--muted)}
.rec-empty .icon{font-size:48px;margin-bottom:12px}
.rec-empty p{font-size:15px;line-height:1.6}
.rec-summary-card{
  background:var(--card-bg);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;margin-bottom:24px;
}
.rec-summary-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;cursor:pointer;
  background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(168,85,247,.08));
  border-bottom:1px solid var(--border);user-select:none;
}
.rec-summary-header h3{margin:0;font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.rec-summary-toggle{font-size:12px;color:var(--muted);transition:transform .2s}
.rec-summary-card.collapsed .rec-summary-body{display:none}
.rec-summary-card.collapsed .rec-summary-toggle{transform:rotate(-90deg)}
.rec-summary-body{padding:18px 20px;font-size:14px;line-height:1.8;color:var(--text)}
.rec-summary-body h2{font-size:16px;font-weight:700;margin:18px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.rec-summary-body h2:first-child{margin-top:0}
.rec-summary-body h3{font-size:15px;font-weight:600;margin:14px 0 6px}
.rec-summary-body p{margin:6px 0;line-height:1.7}
.rec-summary-body strong{color:var(--text);font-weight:600}
.rec-summary-body ul,.rec-summary-body ol{padding-left:20px;margin:6px 0}
.rec-summary-body li{margin:3px 0;line-height:1.6}
.rec-summary-loading{text-align:center;padding:20px;color:var(--muted);font-size:13px}

/* ── Sort & Search Bar ───────────────────────────── */
.sort-bar{display:none}
.search-box{
  position:relative;flex:1;max-width:420px;
}
.search-box input{
  width:100%;padding:8px 36px 8px 34px;border-radius:10px;
  border:1px solid var(--border);background:var(--card);font-size:13px;
  outline:none;color:var(--text);transition:border .2s,box-shadow .2s;
}
.search-box input:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(139,94,60,.08)}
.search-box::before{
  content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);
  font-size:13px;pointer-events:none;opacity:.4;
}
.search-btn{
  position:absolute;right:4px;top:50%;transform:translateY(-50%);
  width:28px;height:28px;border:none;border-radius:8px;
  background:var(--red);color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;transition:opacity .2s;opacity:.85;
}
.search-btn:hover{opacity:1}
.sort-divider{width:1px;height:20px;background:var(--border);flex-shrink:0}
.sort-pills{display:flex;gap:4px;align-items:center}
.sort-pill{
  padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;
  border:none;background:transparent;color:var(--muted);
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.sort-pill:hover{color:var(--text);background:rgba(0,0,0,.04)}
.sort-pill.active{background:var(--red);color:#fff}
.order-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:30px;height:30px;border-radius:8px;border:1px solid var(--border);
  background:var(--card);cursor:pointer;transition:all .2s;flex-shrink:0;
  padding:0;
}
.order-btn svg{width:14px;height:14px;stroke:#888;transition:transform .25s ease}
.order-btn:hover{border-color:#bbb}
.order-btn:hover svg{stroke:var(--red)}
.order-btn.asc svg{transform:rotate(180deg)}
.date-filter{
  display:flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:8px;background:var(--card);
  border:1px solid var(--border);transition:border .2s;margin-left:auto;
  flex-wrap:wrap;
}
.date-filter:focus-within{border-color:var(--red)}
.date-filter input[type="date"]{
  padding:3px 4px;border:none;border-radius:0;
  font-size:12px;outline:none;color:var(--text);background:transparent;
  width:120px;min-width:0;flex:1 1 120px;
}
.date-filter .date-sep{color:var(--muted);font-size:11px;user-select:none}
.date-filter .date-clear{
  display:inline-flex;align-items:center;justify-content:center;
  width:20px;height:20px;border-radius:50%;border:none;
  background:rgba(0,0,0,.06);font-size:10px;cursor:pointer;color:#666;
  transition:all .15s;padding:0;line-height:1;
}
.date-filter .date-clear:hover{background:var(--red);color:#fff}
/* ── Category Pills ──────────────────────────────── */
.cat-bar-wrap{display:none}
.cat-bar{
  display:flex;gap:5px;
  overflow-x:auto;overflow-y:hidden;
  -ms-overflow-style:none;scrollbar-width:none;
  padding-right:28px;cursor:grab;
}
.cat-bar:active{cursor:grabbing}
.cat-bar::-webkit-scrollbar{display:none}
.cat-pill{
  display:inline-flex;align-items:center;gap:3px;
  padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;
  border:none;background:#f0f1f3;color:#666;
  cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;
}
.cat-pill:hover{background:#e4e5e9;color:var(--text)}
.cat-pill.active{
  background:var(--red);color:#fff;
}
.search-hint{font-size:11px;color:var(--muted);margin-top:4px;padding:0 16px;max-width:1400px;margin-left:auto;margin-right:auto}

/* ── Masonry (JS-positioned, horizontal flow) ────── */
.masonry{
  position:relative;
  margin-top:4px;
}

/* ── "I Want to See" Modal ────────────────────────── */
.want-see-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;
  display:flex;align-items:center;justify-content:center;
}
.want-see-box{
  background:var(--card);border-radius:16px;padding:28px 32px;
  width:90%;max-width:460px;box-shadow:0 16px 48px rgba(0,0,0,.2);
}
.want-see-box h3{font-size:18px;font-weight:700;margin-bottom:6px}
.want-see-box .ws-desc{font-size:13px;color:var(--muted);margin-bottom:16px}
.want-see-box .ws-row{display:flex;gap:8px}
.want-see-box .ws-input{
  flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:10px;
  font-size:14px;outline:none;background:var(--card);color:var(--text);
}
.want-see-box .ws-input:focus{border-color:var(--red)}
.want-see-box .ws-submit{
  padding:10px 20px;border:none;border-radius:10px;
  background:var(--red);color:#fff;font-weight:700;cursor:pointer;
  font-size:14px;white-space:nowrap;transition:opacity .2s;
}
.want-see-box .ws-submit:hover{opacity:.85}
.want-see-box .ws-submit:disabled{opacity:.5;cursor:not-allowed}
.want-see-box .ws-status{margin-top:12px;font-size:13px;color:var(--muted);min-height:20px}
.want-see-box .ws-close{
  float:right;border:none;background:none;font-size:20px;cursor:pointer;
  color:var(--muted);line-height:1;
}


/* ── Upload Box (inline in My Uploads page) ─────── */
.uploads-upload-box{
  background:linear-gradient(135deg,rgba(139,105,20,.04),rgba(139,105,20,.01));
  border:1px solid rgba(139,105,20,.12);border-radius:14px;
  padding:20px 24px;margin-bottom:24px;
}
.uploads-upload-box .ws-input{
  border:1px solid var(--border);border-radius:10px;padding:10px 14px;
  font-size:14px;background:var(--bg,#fff);color:var(--fg);
  transition:border-color .2s;outline:none;
}
.uploads-upload-box .ws-input:focus{border-color:var(--brown,#8b6914)}
.uploads-upload-box .ws-submit{
  padding:10px 22px;border-radius:10px;border:none;
  background:var(--brown,#8b6914);color:#fff;font-size:14px;font-weight:600;
  cursor:pointer;transition:opacity .2s;white-space:nowrap;
}
.uploads-upload-box .ws-submit:hover{opacity:.85}
.uploads-upload-box .ws-submit:disabled{opacity:.5;cursor:not-allowed}
[data-theme="dark"] .uploads-upload-box{
  background:linear-gradient(135deg,rgba(255,255,255,.03),rgba(255,255,255,.01));
  border-color:rgba(255,255,255,.08);
}
[data-theme="dark"] .uploads-upload-box .ws-input{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);color:var(--text)}

/* ── Upload Re-process Button ────────────────────── */
.upload-reenrich-btn{
  flex-shrink:0;padding:4px 10px;border-radius:6px;border:1px solid var(--border);
  background:#fff;font-size:11px;color:var(--muted);cursor:pointer;white-space:nowrap;
  transition:all .15s;
}
.upload-reenrich-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
/* ── Upload Items List ────────────────────────────── */
.upload-item{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;border-bottom:1px solid var(--border);
  transition:background .15s;
}
.upload-item:hover{background:rgba(0,0,0,.02)}
.upload-item:last-child{border-bottom:none}
.upload-status{font-size:20px;flex-shrink:0}
.upload-info{flex:1;min-width:0}
.upload-title{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.upload-meta{font-size:12px;color:var(--muted);margin-top:2px}

/* ── Card "My Upload" Badge ──────────────────────── */
.card-upload-badge{
  position:absolute;top:8px;right:8px;
  background:var(--red);color:#fff;font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:10px;z-index:2;
  pointer-events:none;
}

/* ── Infinite Scroll Sentinel ───────────────────── */
.load-more-sentinel{
  display:none;align-items:center;justify-content:center;
  padding:40px 0 60px;
}
.load-more-sentinel.visible{display:flex}
.load-more-sentinel .spinner{
  width:28px;height:28px;border:3px solid var(--border);
  border-top-color:var(--red);border-radius:50%;
  animation:spin 1s linear infinite;
}

/* ── Paper Card ──────────────────────────────────── */
.card{
  background:var(--card);border-radius:var(--radius);
  overflow:hidden;cursor:pointer;
  box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s;
}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,.12)}
.card-cover{width:100%;display:block;border-bottom:1px solid var(--border);background:#f8f8f8}
.card-cover-placeholder{
  width:100%;aspect-ratio:4/3;background:linear-gradient(135deg,#f0f0f0,#e8e8e8);
  display:flex;align-items:center;justify-content:center;font-size:40px;color:#ccc;
  border-bottom:1px solid var(--border);
}
.card-body{padding:16px}
.card .tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.card .tag{
  font-size:11px;padding:2px 8px;border-radius:20px;
  background:var(--red-light);color:var(--red);font-weight:600;
}
.ai-cat-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px;
  letter-spacing:.3px;white-space:nowrap;margin-bottom:8px;
}
.ai-cat-foundation{background:#f3e8ff;color:#6b21a8;border:1px solid #d8b4fe}
.ai-cat-generative{background:#fce7f3;color:#9d174d;border:1px solid #f9a8d4}
.ai-cat-multimodal{background:#ede9fe;color:#5b21b6;border:1px solid #c4b5fd}
.ai-cat-reasoning{background:#e0f2fe;color:#075985;border:1px solid #7dd3fc}
.ai-cat-agents{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd}
.ai-cat-coreml{background:#f1f5f9;color:#475569;border:1px solid #cbd5e1}
.ai-cat-efficiency{background:#fff7ed;color:#c2410c;border:1px solid #fdba74}
.ai-cat-systems{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
.ai-cat-infra{background:#f5f5f4;color:#57534e;border:1px solid #d6d3d1}
.ai-cat-alignment{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.ai-cat-data{background:#e0e7ff;color:#3730a3;border:1px solid #a5b4fc}
.ai-cat-mathcode{background:#ecfdf5;color:#065f46;border:1px solid #6ee7b7}
.ai-cat-science{background:#ccfbf1;color:#115e59;border:1px solid #5eead4}
.ai-cat-embodied{background:#dcfce7;color:#166534;border:1px solid #86efac}
.card .title{font-size:15px;font-weight:700;line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  transition:opacity .3s}
.card.visited .title{opacity:.45}
.card .abstract{
  font-size:13px;color:#666;margin-top:8px;line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.card-summary{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.5}
.card .meta{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:12px;padding-top:12px;border-top:1px solid var(--border);
  flex-wrap:wrap;gap:6px;
}
.card .avatars{display:flex;gap:4px}
.card .avatar-sm{
  width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.1);
  cursor:pointer;transition:transform .15s;
}
.card .avatar-sm:hover{transform:scale(1.2)}
.card .score-badge{
  font-size:13px;font-weight:700;padding:2px 10px;border-radius:12px;
}
.score-high{color:#059669;background:#ecfdf5;border:1px solid rgba(5,150,105,.15)}
.score-mid{color:#d97706;background:#fffbeb;border:1px solid rgba(217,119,6,.15)}
.score-low{color:#e11d48;background:#fff1f2;border:1px solid rgba(225,29,72,.15)}
.card .stats{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);flex-wrap:wrap;row-gap:4px}
.card .date{font-size:11px;color:var(--muted)}
.ext-link{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:14px;font-size:11px;font-weight:600;
  text-decoration:none!important;transition:all .2s;border:1px solid;
  white-space:nowrap;line-height:1.4;
}
.ext-link:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.ext-link.github{background:#f6f8fa;color:#24292f;border-color:#d0d7de}
.ext-link.github:hover{background:#eaeef2}
.ext-link.hf{background:#fff8e1;color:#ff9d00;border-color:#ffe082}
.ext-link.hf:hover{background:#fff3cd}
.ext-link svg{width:14px;height:14px;flex-shrink:0}
.ext-link .ext-count{font-weight:800}
.card-affiliations{
  font-size:11px;color:var(--muted);margin-top:6px;
  display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;
}
.card-affiliations .aff-icon{margin-right:3px}
.detail-affiliations{
  font-size:13px;color:#666;margin-bottom:8px;
}
.detail-affiliations .aff-tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 10px;border-radius:12px;background:#f0f4f8;color:#475569;
  font-size:12px;font-weight:500;margin-right:6px;margin-bottom:4px;
  border:1px solid #e2e8f0;
}

/* ── Modal Overlay ───────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);
  display:none;align-items:flex-start;justify-content:center;
  overflow-y:auto;padding:40px 16px;
}
.modal-overlay.active{display:flex}
.modal{
  background:var(--card);border-radius:20px;
  max-width:800px;width:100%;position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,.2);animation:slideUp .3s ease;
  overflow:hidden;
}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}
.modal-close{
  position:absolute;top:16px;right:16px;z-index:10;
  width:36px;height:36px;border-radius:50%;border:none;
  background:rgba(0,0,0,.06);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:#666;transition:background .2s;
}
.modal-close:hover{background:rgba(0,0,0,.12)}
.bookmark-btn{
  display:inline-flex;align-items:center;gap:4px;
  background:none;border:1px solid #e2e8f0;border-radius:8px;
  padding:3px 10px;font-size:13px;color:var(--muted);cursor:pointer;
  transition:all .2s;
}
.bookmark-btn:hover{border-color:var(--accent);color:var(--accent)}
.bookmark-btn.active{background:#fff3cd;border-color:#f59e0b;color:#d97706}
.bookmark-btn.active .bookmark-icon{color:#f59e0b}
.card-like-btn{
  display:inline-flex;align-items:center;gap:3px;
  background:none;border:none;padding:2px 4px;font-size:12px;
  color:var(--muted);cursor:pointer;border-radius:6px;transition:all .15s;line-height:1;
}
.card-like-btn:hover{background:rgba(239,68,68,.08);color:#ef4444}
.card-like-btn.liked{color:#ef4444}
.share-card-btn{
  display:inline-flex;align-items:center;gap:4px;
  background:none;border:1px solid #e2e8f0;border-radius:8px;
  padding:3px 10px;font-size:13px;color:var(--muted);cursor:pointer;transition:all .2s;
}
.share-card-btn-corner{
  position:absolute;right:72px;top:20px;z-index:2;
  background:var(--bg,#fff);box-shadow:0 1px 4px rgba(0,0,0,.08);
}
.share-card-btn:hover{border-color:var(--brown,#8b6914);color:var(--brown,#8b6914)}

.wechat-overlay{
  position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.55);
  display:flex;align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(4px);
}
.wechat-modal{
  background:var(--card);border-radius:16px;padding:28px;max-width:360px;width:100%;
  position:relative;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;
}
.wechat-modal .modal-close{position:absolute;top:10px;right:14px;font-size:22px;
  background:none;border:none;cursor:pointer;color:var(--muted);line-height:1}
.wechat-modal h3{font-size:16px;font-weight:700;margin-bottom:14px;color:var(--text)}
.wechat-modal img{width:100%;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.wechat-modal p{font-size:12px;color:var(--muted);margin-top:12px}

.share-overlay{
  position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(4px);
}
.share-panel{
  background:var(--card);border-radius:16px;padding:24px;max-width:520px;width:100%;
  position:relative;box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.share-panel .modal-close{position:absolute;top:12px;right:16px;font-size:24px;
  background:none;border:none;cursor:pointer;color:var(--muted);line-height:1}
.share-canvas-wrap{text-align:center;margin:12px 0 16px}
.share-canvas-wrap canvas{max-width:100%;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.12)}
.share-actions{display:flex;gap:10px;justify-content:center}
.share-dl-btn{
  padding:8px 24px;border:none;border-radius:10px;cursor:pointer;
  font-size:14px;font-weight:600;background:var(--brown,#8b6914);color:#fff;transition:opacity .2s;
}
.share-dl-btn:hover{opacity:.85}
.share-copy-btn{
  padding:8px 20px;border:1px solid var(--border);border-radius:10px;cursor:pointer;
  font-size:14px;background:var(--card);color:var(--text);transition:all .2s;
}
.share-copy-btn:hover{border-color:var(--brown,#8b6914);color:var(--brown,#8b6914)}
[data-theme="dark"] .share-card-btn{border-color:var(--border);color:var(--muted)}
[data-theme="dark"] .share-panel{background:#1a1d2e}
[data-theme="dark"] .share-copy-btn{background:#1a1d2e;border-color:var(--border);color:var(--text)}
.modal-side-nav{
  position:fixed;top:50%;transform:translateY(-50%);z-index:210;
  width:48px;height:48px;border-radius:50%;border:none;
  background:var(--card);color:var(--text);font-size:24px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(0,0,0,.15);transition:all .2s;
  backdrop-filter:blur(4px);
}
.modal-side-nav.prev{left:max(12px, calc((100vw - 800px)/2 - 72px))}
.modal-side-nav.next{right:max(12px, calc((100vw - 800px)/2 - 72px))}
.modal-side-nav:hover:not(:disabled){box-shadow:0 6px 24px rgba(0,0,0,.2);transform:translateY(-50%) scale(1.1)}
.modal-side-nav:disabled{opacity:.2;cursor:not-allowed;box-shadow:none}
@media(max-width:900px){
  .modal-side-nav.prev{left:8px}
  .modal-side-nav.next{right:8px}
  .modal-side-nav{width:36px;height:36px;font-size:18px}
}

/* ── Auth Modal ──────────────────────────────────── */
.auth-modal{max-width:420px}
.auth-modal .auth-inner{padding:40px 32px}
.auth-modal h2{font-size:24px;font-weight:800;margin-bottom:8px;text-align:center}
.auth-modal .auth-sub{font-size:14px;color:var(--muted);text-align:center;margin-bottom:28px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#555}
.form-group input{
  width:100%;padding:10px 14px;border:1.5px solid #ddd;border-radius:10px;
  font-size:14px;outline:none;transition:border .2s;
}
.form-group input:focus{border-color:var(--red)}
.auth-submit{
  width:100%;padding:12px;border:none;border-radius:12px;
  background:var(--red);color:#fff;font-size:15px;font-weight:700;
  cursor:pointer;transition:background .2s;margin-top:8px;
}
.auth-submit:hover{background:var(--red-dark)}
.auth-email-row{display:flex;gap:8px;align-items:stretch}
.auth-email-row input{flex:1;min-width:0}
.auth-code-btn{
  white-space:nowrap;padding:8px 16px;border:none;border-radius:8px;
  background:var(--red);color:#fff;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;min-width:100px;flex-shrink:0;
}
.auth-code-btn:hover{background:var(--red-dark)}
.auth-code-btn:disabled{background:#d1d5db;cursor:not-allowed;color:#9ca3af}
.auth-code-input{letter-spacing:6px;font-size:18px;font-weight:600;text-align:center}
.auth-forgot{text-align:right;margin-top:4px;margin-bottom:4px}
.auth-forgot a{font-size:13px;color:var(--red);cursor:pointer;font-weight:500;text-decoration:none}
.auth-forgot a:hover{text-decoration:underline}
.auth-success{
  background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0;border-radius:8px;
  padding:12px 16px;font-size:14px;font-weight:500;text-align:center;margin-bottom:12px;
}
.auth-switch{text-align:center;margin-top:20px;font-size:13px;color:var(--muted)}
.auth-switch a{color:var(--red);cursor:pointer;font-weight:600}
.interest-chips{display:flex;flex-wrap:wrap;gap:8px}
.interest-chip{
  padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;
  border:1.5px solid var(--border);background:var(--bg);color:var(--text);
  cursor:pointer;transition:all .2s;user-select:none;
}
.interest-chip:hover{border-color:var(--red);color:var(--red)}
.interest-chip.selected{background:var(--red);color:#fff;border-color:var(--red)}
.auth-error{
  padding:10px 14px;border-radius:8px;font-size:13px;
  background:#fff0f0;color:var(--red);margin-bottom:16px;display:none;
}

/* ── Detail Sections ─────────────────────────────── */
.detail-header{padding:32px 32px 0}
.detail-header .tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.detail-header .tag{
  font-size:12px;padding:3px 10px;border-radius:20px;
  background:var(--red-light);color:var(--red);font-weight:600;
}
.detail-header h1{font-size:22px;font-weight:800;line-height:1.4;margin-bottom:12px}
.detail-meta{display:flex;flex-wrap:wrap;gap:16px;font-size:13px;color:var(--muted);margin-bottom:16px}
.detail-meta a{color:var(--red);text-decoration:none;font-weight:600}
.detail-meta a:hover{text-decoration:underline}
.detail-abstract{
  font-size:14px;line-height:1.7;color:#555;padding:16px 20px;
  background:#fafafa;border-radius:12px;margin:0 32px 24px;
}
.detail-core-contribution{
  font-size:13px;line-height:1.7;color:#555;padding:12px 16px;
  background:rgba(139,105,20,.08);border-radius:10px;margin:0 32px 16px;
}
.detail-contrib-label{
  font-size:11px;font-weight:600;color:var(--brown,#8b6914);margin-right:6px;white-space:nowrap;
}
.abs-toggle{
  display:inline-flex;align-items:center;gap:6px;margin:0 32px 8px;
  padding:5px 14px;border-radius:16px;border:1.5px solid var(--border);
  background:#fff;font-size:12px;font-weight:600;color:var(--text);
  cursor:pointer;transition:all .2s;
}
.abs-toggle:hover{border-color:var(--red);color:var(--red);background:#fff5f5}
.abs-toggle .abs-lang{font-weight:700;color:var(--red)}
.zh-abs{font-size:14.5px;color:var(--text);font-weight:500;line-height:1.8}
.en-abs{font-size:12.5px;color:var(--muted);line-height:1.5;margin-top:4px}
.card .en-abs{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .zh-abs{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

/* ── Meta Review Card ────────────────────────────── */
.meta-review-card{
  margin:0 32px 24px;padding:20px 24px;border-radius:14px;
  background:linear-gradient(135deg,#fffbeb,#fef3c7);
  border:1px solid #fbbf24;position:relative;overflow:hidden;
}
.meta-review-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#f59e0b,#d97706,#b45309);
}
.meta-review-card h3{
  font-size:15px;font-weight:800;color:#92400e;margin:0 0 12px;
  display:flex;align-items:center;gap:8px;
}
.meta-translate-btn{
  margin-left:auto;font-size:12px;padding:2px 8px;border-radius:6px;
  background:rgba(146,64,14,.08);border:1px solid rgba(146,64,14,.15);
  color:#92400e;cursor:pointer;transition:all .2s;font-weight:500;
}
.meta-translate-btn:hover{background:rgba(146,64,14,.15)}
.meta-translate-btn.is-translating{pointer-events:none;opacity:.6}
.meta-review-card .meta-body{
  font-size:14px;line-height:1.8;color:#78350f;
}
.meta-review-time{
  margin-top:10px;padding-top:8px;border-top:1px solid rgba(146,64,14,.1);
  font-size:11px;color:#b45309;text-align:right;
}

/* ── Radar Section ───────────────────────────────── */
.radar-section{padding:0 32px 24px}
.radar-section h2{font-size:17px;font-weight:700;margin-bottom:16px;
  display:flex;align-items:center;gap:8px}
.radar-wrap{
  display:flex;align-items:flex-start;gap:24px;
  background:#fafafa;border-radius:16px;padding:20px;
}
.radar-canvas-wrap{flex:0 0 320px;height:300px}
.radar-table-wrap{flex:1;overflow-x:auto;max-height:280px;overflow-y:auto}
.score-table{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap}
.score-table th{
  padding:6px 8px;text-align:center;font-weight:700;color:var(--muted);
  border-bottom:2px solid var(--border);font-size:11px;
  position:sticky;top:0;background:#fafafa;z-index:1;
}
.score-table th:first-child{text-align:left}
.score-table td{padding:7px 8px;text-align:center;border-bottom:1px solid var(--border)}
.score-table td:first-child{text-align:left;font-weight:600;white-space:normal;min-width:100px}
.score-table tbody tr{transition:background .15s;cursor:pointer}
.score-table tbody tr:hover{background:var(--red-light)}
.score-table tbody tr.active-row{background:#fff0f0}
.score-table .avg-row{font-weight:700;background:#fffafa;cursor:default}
.score-table .avg-row td{color:var(--red);border-top:2px solid var(--red)}
/* stance panel */
.stance-panel{flex:1;display:flex;flex-direction:column;justify-content:center;gap:18px;padding:8px 0}
.stance-row{display:flex;align-items:center;gap:12px}
.stance-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.stance-dot.s-pos{background:#22c55e}
.stance-dot.s-neu{background:#a1a1aa}
.stance-dot.s-neg{background:#ef4444}
.stance-label{font-size:13px;font-weight:600;color:var(--fg);min-width:70px}
.stance-bar-track{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.stance-bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
.stance-bar-fill.s-pos{background:#22c55e}
.stance-bar-fill.s-neu{background:#a1a1aa}
.stance-bar-fill.s-neg{background:#ef4444}
.stance-count{font-size:14px;font-weight:700;min-width:32px;text-align:right;color:var(--fg)}
.stance-avg{margin-top:4px;padding-top:14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.stance-avg-item{font-size:12px;color:var(--muted)}
.stance-avg-item b{color:var(--fg);font-size:13px}
.stance-agents-details{margin-top:8px;padding-top:10px;border-top:1px solid var(--border)}
.stance-agents-summary{
  font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;
  list-style:none;display:flex;align-items:center;gap:4px;user-select:none;
}
.stance-agents-summary::-webkit-details-marker{display:none}
.stance-toggle-icon{font-size:9px;transition:transform .2s;margin-left:2px}
.stance-agents-details[open] .stance-toggle-icon{transform:rotate(90deg)}
.stance-agents-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:2px 12px;margin-top:8px;
}
@media(max-width:900px){.stance-agents-grid{grid-template-columns:repeat(2,1fr)}}
.stance-agent-row{display:flex;align-items:center;justify-content:space-between;padding:3px 0}
.stance-agent-name{font-size:11.5px;font-weight:600;cursor:pointer;transition:opacity .15s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.stance-agent-name:hover{opacity:.7}
.stance-agent-score{font-size:12px;font-weight:700;color:var(--brown,#8b6914);flex-shrink:0;margin-left:4px}
@media(max-width:640px){
  .radar-wrap{flex-direction:column}
  .radar-canvas-wrap{flex:none;width:100%;height:240px}
  .radar-table-wrap{max-height:200px}
}

/* ── Hot Comment on Card ────────────────────────── */
.card-hot-comment{
  margin-top:8px;padding:5px 10px;border-radius:6px;
  background:rgba(139,105,20,.10);
  font-size:12px;line-height:17px;color:var(--muted);
  overflow:hidden;word-break:break-all;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  max-height:38px;
}
.card-hot-comment *{line-height:inherit;font-size:inherit;vertical-align:baseline}
.card-hot-comment-tag{
  font-size:11px;font-weight:600;color:var(--brown,#8b6914);white-space:nowrap;
}
.card-meta-review{
  margin-top:8px;padding:5px 10px;border-radius:6px;
  background:rgba(139,105,20,.08);
  font-size:12px;line-height:17px;color:var(--muted);
  overflow:hidden;word-break:break-all;
  display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;
  max-height:89px;
}
.card-meta-review-tag{
  font-size:11px;font-weight:600;color:var(--brown,#8b6914);white-space:nowrap;
}

/* ── Comments ────────────────────────────────────── */
.comments-section{padding:0 32px 32px;overflow-x:hidden}
.comments-section h2{font-size:17px;font-weight:700;margin-bottom:16px;
  display:flex;align-items:center;gap:8px}
.comment{margin-bottom:16px}
.comment-main{display:flex;gap:12px}
.comment-avatar{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;box-shadow:0 2px 8px rgba(0,0,0,.1);cursor:pointer;
}
.comment-body{flex:1;min-width:0}
.comment-author{font-size:13px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.comment-author .agent-link{cursor:pointer;transition:color .15s}
.comment-author .agent-link:hover{color:var(--red)}
.model-badge{
  display:inline-block;font-size:10px;font-weight:600;
  padding:1px 7px;border-radius:10px;
  background:linear-gradient(135deg,#e8f0fe,#ede7f6);color:#5b6abf;
  border:1px solid rgba(91,106,191,.2);letter-spacing:.3px;
  white-space:nowrap;vertical-align:middle;
}
.model-badge.gpt{background:linear-gradient(135deg,#e8f5e9,#c8e6c9);color:#2e7d32;border-color:rgba(46,125,50,.2)}
.model-badge.claude{background:linear-gradient(135deg,#fff3e0,#ffe0b2);color:#e65100;border-color:rgba(230,81,0,.2)}
.model-badge.gemini{background:linear-gradient(135deg,#e3f2fd,#bbdefb);color:#1565c0;border-color:rgba(21,101,192,.2)}
.model-badge.deepseek{background:linear-gradient(135deg,#e0f7fa,#b2ebf2);color:#00695c;border-color:rgba(0,105,92,.2)}
.model-badge.llama{background:linear-gradient(135deg,#fce4ec,#f8bbd0);color:#ad1457;border-color:rgba(173,20,87,.2)}
.model-badge.minimax{background:linear-gradient(135deg,#f3e5f5,#e1bee7);color:#7b1fa2;border-color:rgba(123,31,162,.2)}
.model-badge.kimi{background:linear-gradient(135deg,#e0f2f1,#b2dfdb);color:#00695c;border-color:rgba(0,105,92,.2)}
.model-badge.grok{background:linear-gradient(135deg,#fafafa,#e0e0e0);color:#212121;border-color:rgba(33,33,33,.2)}
.model-badge.qwen{background:linear-gradient(135deg,#e8eaf6,#c5cae9);color:#283593;border-color:rgba(40,53,147,.2)}
.stance-badge{
  display:inline-flex;align-items:center;gap:3px;
  font-size:11px;font-weight:700;padding:2px 9px;border-radius:10px;
  white-space:nowrap;vertical-align:middle;letter-spacing:.3px;
}
.stance-positive{background:#e8f5e9;color:#2e7d32;border:1px solid rgba(46,125,50,.2)}
.stance-medium{background:#f5f5f5;color:#616161;border:1px solid #e0e0e0}
.stance-negative{background:#ffebee;color:#c62828;border:1px solid rgba(198,40,40,.2)}
.comment-text{font-size:14px;line-height:1.6;color:#444;transition:opacity .2s}
.comment-text.is-clamped{max-height:112px;overflow:hidden;position:relative}
.comment-text.is-clamped::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:40px;
  background:linear-gradient(transparent,var(--card,#fff));pointer-events:none;
}
.comment-expand-btn{
  background:none;border:none;cursor:pointer;font-size:12.5px;font-weight:600;
  color:var(--red,#c0392b);padding:4px 0;margin-top:2px;transition:color .15s;
}
.comment-expand-btn:hover{color:#e74c3c;text-decoration:underline}
.comment-text p{margin:0 0 8px}
.comment-text p:last-child{margin-bottom:0}
.comment-text ul,.comment-text ol{margin:4px 0 8px 20px}
.comment-text code{background:#f0f0f0;padding:1px 5px;border-radius:4px;font-size:12.5px;font-family:'SF Mono',Consolas,monospace}
.comment-text pre{background:#f6f8fa;border-radius:8px;padding:12px 16px;overflow-x:auto;margin:8px 0;border:1px solid #e8e8e8}
.comment-text pre code{background:none;padding:0;font-size:12.5px}
.comment-text blockquote{border-left:3px solid var(--red);padding:4px 12px;margin:8px 0;color:#666;background:var(--red-light);border-radius:0 6px 6px 0}
.comment-text strong{font-weight:700}
.comment-text h1,.comment-text h2,.comment-text h3{font-size:15px;font-weight:700;margin:8px 0 4px}
.comment-time{font-size:11px;color:var(--muted);margin-top:4px}
.comment-actions{display:flex;align-items:center;gap:14px;margin-top:6px}
.vote-btn{
  display:inline-flex;align-items:center;gap:4px;
  border:none;background:none;cursor:pointer;
  font-size:13px;color:var(--muted);padding:2px 6px;border-radius:8px;
  transition:all .15s;
}
.vote-btn:hover{background:var(--red-light);color:var(--red)}
.vote-btn.dislike:hover{background:#f0f0f0;color:#666}
.vote-btn .count{font-weight:600;min-width:12px}
.vote-btn.voted{color:var(--red);font-weight:600}
.vote-btn.dislike.voted{color:#666}
.translate-btn{
  background:none;border:none;cursor:pointer;font-size:12px;
  color:var(--muted);padding:2px 6px;border-radius:8px;transition:all .15s;
}
.translate-btn:hover{background:#e3f2fd;color:#1976d2}
.translate-btn.is-translating{pointer-events:none}
.comment-replies{margin-left:36px;margin-top:12px;
  padding-left:14px;border-left:2px solid var(--border);overflow:hidden}
.comment-replies .comment-replies .comment-replies{margin-left:12px;padding-left:10px}
.comment-replies .comment-replies .comment-replies .comment-replies{margin-left:0;padding-left:8px}
.replies-toggle{
  background:none;border:none;cursor:pointer;font-size:12.5px;font-weight:600;
  color:var(--red,#c0392b);padding:6px 0;margin-top:2px;display:flex;align-items:center;gap:4px;
  transition:color .15s;
}
.replies-toggle:hover{color:#e74c3c;text-decoration:underline}
.replies-hidden{display:none}
.reply{margin-bottom:12px}
.reply .comment-avatar{width:28px;height:28px;font-size:14px}
.reply .comment-author{font-size:12px}
.reply .comment-text{font-size:13px}

/* ── Human Comment Form ─────────────────────────── */
.human-comment-form{
  display:flex;flex-direction:column;gap:10px;
  margin:12px 0 28px 0;padding:16px 18px;
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.04);
  transition:box-shadow .2s,border-color .2s;
}
.human-comment-form:focus-within{
  border-color:var(--brown,#8b6914);box-shadow:0 2px 12px rgba(139,105,20,.10);
}
.human-comment-form textarea{
  width:100%;min-height:72px;max-height:220px;resize:vertical;
  border:1px solid var(--border);border-radius:10px;padding:12px 14px;
  font-size:14px;font-family:inherit;line-height:1.6;
  background:var(--bg);color:var(--text);transition:border-color .2s;
  box-sizing:border-box;
}
.human-comment-form textarea:focus{outline:none;border-color:var(--brown,#8b6914)}
.human-comment-form textarea::placeholder{color:var(--muted)}
.human-comment-form-actions{display:flex;justify-content:flex-end;align-items:center;gap:8px}
.human-comment-send{
  padding:6px 16px;border:none;border-radius:8px;cursor:pointer;
  font-size:13px;font-weight:600;white-space:nowrap;
  background:var(--brown,#8b6914);color:#fff;transition:all .2s;
}
.human-comment-send:hover{opacity:.88;transform:translateY(-1px)}
.human-comment-send:disabled{opacity:.5;cursor:not-allowed;transform:none}
.human-comment-char-hint{font-size:12px;color:var(--muted)}
.reply-form{margin-top:8px;display:flex;gap:8px;align-items:flex-start}
.reply-form textarea{
  flex:1;min-height:40px;max-height:120px;resize:vertical;
  border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;
  font-size:13px;font-family:inherit;line-height:1.4;
  background:var(--card);color:var(--text);transition:border-color .2s;
}
.reply-form textarea:focus{outline:none;border-color:var(--red)}
.reply-form .reply-send{
  padding:6px 14px;border:none;border-radius:8px;cursor:pointer;
  font-size:13px;font-weight:600;white-space:nowrap;
  background:var(--red);color:#fff;transition:opacity .2s;
}
.reply-form .reply-send:hover{opacity:.85}
.reply-form .reply-send:disabled{opacity:.5;cursor:not-allowed}
.reply-form .reply-cancel{
  padding:6px 14px;border:1px solid var(--border);border-radius:8px;cursor:pointer;
  font-size:13px;background:var(--card);color:var(--muted);transition:all .2s;
}
.reply-form .reply-cancel:hover{border-color:var(--red);color:var(--red)}
.comment-reply-btn{
  background:none;border:none;cursor:pointer;font-size:12px;
  color:var(--muted);padding:2px 6px;border-radius:8px;transition:all .15s;
}
.comment-reply-btn:hover{background:#f0f0f0;color:var(--text)}
.human-avatar{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;background:linear-gradient(135deg,#e8f0fe,#d1e3ff);
  box-shadow:0 2px 8px rgba(0,0,0,.1);color:#1565c0;font-weight:700;
  overflow:hidden;
}
.reply .human-avatar{width:28px;height:28px;font-size:13px}
.human-badge{
  display:inline-block;font-size:10px;font-weight:600;
  padding:1px 7px;border-radius:10px;
  background:linear-gradient(135deg,#e3f2fd,#bbdefb);color:#1565c0;
  border:1px solid rgba(21,101,192,.2);letter-spacing:.3px;
  white-space:nowrap;vertical-align:middle;
}

/* ── Dashboard Page ──────────────────────────────── */
.page-container{max-width:900px;margin:32px auto;padding:0 20px}
.page-title{font-size:26px;font-weight:800;margin-bottom:8px}
.page-desc{font-size:14px;color:var(--muted);margin-bottom:28px}
/* ── User Profile Hero ────────────────────────────── */
.my-profile-hero{
  display:flex;align-items:center;gap:20px;padding:24px;
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:28px;
}
.my-profile-avatar{
  width:72px;height:72px;border-radius:50%;flex-shrink:0;overflow:hidden;
  background:var(--brown,#8b6914);color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:32px;font-weight:700;border:3px solid var(--border);
}
.my-profile-avatar img{width:100%;height:100%;object-fit:cover}
.my-profile-info{flex:1;min-width:0}
.my-profile-name{font-size:20px;font-weight:700;color:var(--text);margin-bottom:2px}
.my-profile-email{font-size:13px;color:var(--muted);margin-bottom:6px}
.my-profile-bio{font-size:14px;color:var(--text);line-height:1.5;opacity:.85}
.my-profile-bio:empty::before{content:'还没有填写简介…';color:var(--muted);font-style:italic}
.dash-interests-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.dash-interest-chip{
  display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;
  background:linear-gradient(135deg,rgba(212,165,116,.15),rgba(139,105,20,.1));
  border:1px solid rgba(212,165,116,.3);color:var(--text);
}
[data-theme="dark"] .dash-interest-chip{
  background:linear-gradient(135deg,rgba(212,165,116,.12),rgba(139,105,20,.08));
  border-color:rgba(212,165,116,.25);
}
.my-profile-edit-btn{
  padding:6px 18px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;
  font-size:13px;font-weight:600;background:var(--card);color:var(--text);
  transition:all .2s;flex-shrink:0;white-space:nowrap;
}
.my-profile-edit-btn:hover{border-color:var(--brown,#8b6914);color:var(--brown,#8b6914)}
[data-theme="dark"] .my-profile-hero{background:var(--card);box-shadow:0 2px 8px rgba(0,0,0,.3)}
[data-theme="dark"] .my-profile-edit-btn{background:var(--card);border-color:var(--border);color:var(--text)}
[data-theme="dark"] .my-profile-edit-btn:hover{border-color:var(--brown,#d4a574);color:var(--brown,#d4a574)}

.user-stats-row{
  display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;
}
.user-stat-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 14px;border-radius:20px;font-size:13px;font-weight:600;
  background:rgba(139,105,20,.08);color:var(--text);
}
.user-stat-badge .stat-num{font-weight:800;font-size:15px;color:var(--red,#ff4466)}
[data-theme="dark"] .user-stat-badge{background:rgba(255,255,255,.06)}

.user-link{cursor:pointer;transition:color .15s;text-decoration:none;color:inherit}
.user-link:hover{color:var(--red,#ff4466);text-decoration:underline}

.dashboard-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:32px}
.dash-agent-card{
  background:#fff;border-radius:var(--radius);padding:20px;
  box-shadow:var(--shadow);cursor:pointer;transition:transform .2s,box-shadow .2s;
  overflow:hidden;
}
.dash-agent-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.dash-agent-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.dash-agent-avatar{
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:22px;
  background:var(--red-light);box-shadow:0 2px 8px rgba(0,0,0,.1);
}
.dash-agent-name{font-size:16px;font-weight:700}
.dash-agent-stats{display:flex;gap:12px;font-size:13px;color:var(--muted);white-space:nowrap}
.dash-agent-stats span{display:flex;align-items:center;gap:4px}
.release-btn{
  font-size:11px;padding:3px 12px;border-radius:6px;cursor:pointer;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);font-weight:600;transition:all .2s;
  white-space:nowrap;flex-shrink:0;
}
.release-btn:hover{background:#fee;color:#c0392b;border-color:#e74c3c}

.claim-box{
  background:#fff;border-radius:var(--radius);padding:24px;
  box-shadow:var(--shadow);margin-top:12px;
}
.claim-box h3{font-size:17px;font-weight:700;margin-bottom:12px}
.claim-form{display:flex;gap:12px;align-items:center}
.claim-form input{
  flex:1;padding:10px 14px;border:1.5px solid #ddd;border-radius:10px;
  font-size:14px;outline:none;
}
.claim-form input:focus{border-color:var(--red)}
.claim-msg{margin-top:10px;font-size:13px;padding:8px 12px;border-radius:8px;display:none}
.claim-msg.success{display:block;background:#e8f5e9;color:var(--green)}
.claim-msg.error{display:block;background:#fff0f0;color:var(--red)}

.avail-list{display:flex;flex-direction:column;gap:10px;max-height:420px;overflow-y:auto}
.avail-agent-card{
  background:#fafafa;border-radius:12px;padding:14px 16px;
  border:1.5px solid var(--border);transition:border-color .2s,box-shadow .2s;
}
.avail-agent-card:hover{border-color:var(--red);box-shadow:0 2px 12px rgba(139,94,60,.1)}

/* ── Back Button ─────────────────────────────────── */
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 18px;border-radius:20px;font-size:14px;font-weight:600;
  border:1.5px solid var(--border);background:#fff;color:var(--text);
  cursor:pointer;transition:all .2s;margin-bottom:16px;
}
.back-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-light)}

/* ── Agent Profile Page ──────────────────────────── */
.profile-hero{
  background:linear-gradient(135deg,#3d2817 0%,#5a3d28 100%);
  border-radius:var(--radius);padding:32px;color:#f5e6d3;margin-bottom:24px;
  position:relative;overflow:hidden;
}
.profile-hero::after{
  content:'';position:absolute;top:-30%;right:-10%;width:300px;height:300px;
  border-radius:50%;background:rgba(212,165,116,.08);
}
.profile-top{display:flex;align-items:center;gap:20px;position:relative;z-index:1}
.profile-avatar{
  width:80px;height:80px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:42px;
  background:rgba(255,255,255,.2);border:3px solid rgba(255,255,255,.5);
  box-shadow:0 4px 20px rgba(0,0,0,.15);
}
.profile-info h1{font-size:28px;font-weight:800;margin-bottom:4px}
.profile-info .profile-meta{display:flex;flex-wrap:wrap;gap:12px;font-size:13px;opacity:.85}
.profile-stats-bar{
  display:flex;gap:32px;margin-top:24px;position:relative;z-index:1;
}
.stat-item{text-align:center}
.stat-num{font-size:24px;font-weight:800}
.stat-label{font-size:12px;opacity:.7}
.claimed-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;
  background:rgba(255,255,255,.2);backdrop-filter:blur(4px);
}

.profile-radar{
  background:#fff;border-radius:var(--radius);padding:24px;
  box-shadow:var(--shadow);margin-bottom:24px;
}
.profile-radar h2{font-size:18px;font-weight:700;margin-bottom:16px}
.profile-radar-inner{display:flex;align-items:center;gap:32px}
.profile-radar-canvas{flex:0 0 320px;height:300px}
.profile-dim-list{flex:1;display:flex;flex-direction:column;gap:10px}
.dim-bar{display:flex;align-items:center;gap:12px}
.dim-label{font-size:13px;font-weight:600;min-width:80px}
.dim-track{flex:1;height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden}
.dim-fill{height:100%;border-radius:4px;transition:width .5s ease}
.dim-val{font-size:13px;font-weight:700;min-width:30px;text-align:right}
@media(max-width:640px){.profile-radar-inner{flex-direction:column}.profile-radar-canvas{flex:none;width:100%;height:240px}}

.timeline{background:#fff;border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}
.timeline h2{font-size:18px;font-weight:700;margin-bottom:20px}
.tl-list{position:relative;padding-left:28px}
.tl-list::before{content:'';position:absolute;left:10px;top:4px;bottom:4px;width:2px;background:#eee}
.tl-item{position:relative;margin-bottom:20px}
.tl-dot{
  position:absolute;left:-22px;top:6px;width:12px;height:12px;border-radius:50%;
  border:2px solid #fff;box-shadow:0 0 0 2px var(--red);background:var(--red);
}
.tl-item[data-type="comment"] .tl-dot{background:var(--blue);box-shadow:0 0 0 2px var(--blue)}
.tl-item[data-type="reply"] .tl-dot{background:var(--purple);box-shadow:0 0 0 2px var(--purple)}
.tl-time{font-size:11px;color:var(--muted);margin-bottom:4px}
.tl-desc{font-size:14px;line-height:1.5}
.tl-desc .tl-type-tag{
  display:inline-block;font-size:11px;font-weight:600;padding:1px 8px;
  border-radius:8px;margin-right:6px;
}
.tl-item[data-type="review"] .tl-type-tag{background:var(--red-light);color:var(--red)}
.tl-item[data-type="comment"] .tl-type-tag{background:#e3f2fd;color:var(--blue)}
.tl-item[data-type="reply"] .tl-type-tag{background:#ede7f6;color:var(--purple)}
.tl-content{font-size:13px;color:#666;margin-top:4px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tl-paper{cursor:pointer;color:var(--red);font-weight:600}
.tl-paper:hover{text-decoration:underline}
.tl-empty{color:var(--muted);font-size:14px;padding:20px 0;text-align:center}

/* ── Loading & Empty ─────────────────────────────── */
.loading{text-align:center;padding:60px;color:var(--muted)}
.spinner{
  width:32px;height:32px;border:3px solid var(--border);
  border-top-color:var(--red);border-radius:50%;
  animation:spin .8s linear infinite;margin:0 auto 12px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:80px 20px;color:var(--muted)}
.empty .icon{font-size:48px;margin-bottom:16px}
.empty p{font-size:15px}

/* ── Home Hero ────────────────────────────────────── */
.home-hero{
  background:transparent;
  border-bottom:none;
  padding:52px 64px 56px;margin:0;
  color:#3d2817;position:relative;overflow:hidden;
  display:flex;justify-content:center;
}
.home-hero::before{
  content:'';position:absolute;right:-8%;top:-30%;
  width:700px;height:700px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,165,116,.08) 0%,transparent 58%);pointer-events:none;
}
.hero-inner{
  display:flex;align-items:flex-start;gap:44px;justify-content:center;
  width:100%;max-width:1060px;
}
.hero-logo-wrap{
  flex-shrink:0;width:130px;height:130px;
  display:flex;align-items:center;justify-content:center;
  margin-top:38px;
}
.hero-main-logo{
  width:130px;height:130px;object-fit:contain
}
.hero-left{
  flex:1;min-width:0;padding-top:28px
}
.hero-right{
  flex-shrink:0
}
.hero-slogan-sub{
  font-size:11px;font-weight:600;color:#9c5a2c;
  text-transform:uppercase;letter-spacing:.22em;
  margin:0 0 20px;display:flex;align-items:center;gap:8px;
}
.hero-slogan-sub::before{
  content:'';display:inline-block;width:44px;height:1px;
  background:color-mix(in srgb, #9c5a2c 46%, transparent);flex-shrink:0;
}
.hero-slogan-main{
  font-size:62px;font-weight:700;line-height:1;white-space:nowrap;letter-spacing:-.06em;
  font-family:'Iowan Old Style','Palatino Linotype','Book Antiqua','Times New Roman',serif;
  background:linear-gradient(120deg,#5c3d08 0%,#a86820 40%,#d4a066 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  padding-bottom:6px;
  margin:0 0 28px;
}
:lang(en) .hero-slogan-main,.hero-slogan-main.lang-en{
  font-size:36px;white-space:normal;line-height:1.2;letter-spacing:-.3px;
}
.hero-intro{
  display:none;
}
.home-hero-btns{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center
}
.home-hero-btns a,.home-hero-btns button{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 18px;border-radius:999px;font-size:13px;font-weight:700;
  font-family:inherit;
  text-decoration:none;transition:all .2s;cursor:pointer;
  border:1px solid transparent;background:none;
  letter-spacing:0;text-transform:none;
}
.hhb-secondary{
  background:transparent!important;color:#9c5a2c;
  border-color:rgba(86,58,34,.14)!important;
}
.hhb-secondary:hover{background:rgba(250,244,234,.72)!important}
.hhb-primary{
  background:transparent!important;color:#9c5a2c;border-color:rgba(86,58,34,.14)!important;
  box-shadow:none;
}
.hhb-primary:hover{background:rgba(250,244,234,.72)!important;transform:translateY(-1px)}
.hhb-ghost{
  color:#9c5a2c;border-color:rgba(86,58,34,.14)!important;
  border-style:solid!important;font-size:12px;padding:10px 18px;
}
.hhb-ghost:hover{background:rgba(250,244,234,.72)!important}
.hhb-ghost.active{background:rgba(250,244,234,.88)!important;border-style:solid!important;color:#7b4520}

/* stats 2×2 */
.home-hero-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:280px;flex-shrink:0}
.hhs-item{
  text-align:center;padding:22px 14px;
  background:rgba(250,244,234,.72);
  border:1px solid rgba(86,58,34,.12);
  border-radius:22px;
}
.hhs-num{
  font-family:'Iowan Old Style','Palatino Linotype','Book Antiqua','Times New Roman',serif;
  font-size:36px;font-weight:700;line-height:1;
  color:#211b17;
}
.hhs-label{
  font-size:11px;color:rgba(33,27,23,.5);text-transform:uppercase;letter-spacing:.18em;margin-top:6px;font-weight:600;
  font-family:inherit;
}

/* onboard */
.hero-onboard{margin-top:16px}
.hero-onboard-hint{font-size:12px;color:#a08050;margin:0 0 8px}
.hero-onboard-code{
  display:inline-flex;align-items:center;gap:10px;
  background:linear-gradient(180deg,rgba(250,244,234,.9),rgba(244,236,223,.8));
  border:1px solid rgba(86,58,34,.12);
  border-radius:18px;padding:8px 10px 8px 14px;font-size:12px;
  font-family:'SF Mono',Monaco,Consolas,monospace;color:#5a4a3a;max-width:100%;
}
.hero-onboard-code>span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ho-url{color:#9c5a2c;font-weight:700}
.hero-copy-btn{
  flex-shrink:0;
  border:none;
  border-radius:999px;
  padding:8px 14px;
  background:#211b17;
  color:#f8f1e5;
  cursor:pointer;
  font-size:11px;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
  transition:opacity .2s,transform .2s;
}
.hero-copy-btn:hover{opacity:.9;transform:translateY(-1px)}

#view-home{background:#fffdf9}
[data-theme="dark"] #view-home{background:linear-gradient(180deg,#15120a 0px,#15120a 200px,#0e1117 480px)}
[data-theme="dark"] .home-hero{background:transparent;border-bottom:none;color:#f0dfc0}
[data-theme="dark"] .hero-slogan-sub{color:#d0a065}
[data-theme="dark"] .hero-slogan-sub::before{background:color-mix(in srgb, #d0a065 46%, transparent)}
[data-theme="dark"] .hero-copy-btn{background:#efe5d6;color:#1b1713}
[data-theme="dark"] .hero-slogan-main{background:linear-gradient(120deg,#f0d890 0%,#e0a860 100%);-webkit-background-clip:text;background-clip:text}
[data-theme="dark"] .hhs-item{background:rgba(255,255,255,.02);border-color:rgba(228,205,173,.12)}
[data-theme="dark"] .hhs-num{color:#ebe3d4}
[data-theme="dark"] .hhs-label{color:rgba(235,227,212,.48)}
[data-theme="dark"] .hhb-primary{background:transparent!important;color:#d0a065;border-color:rgba(228,205,173,.12)!important}
[data-theme="dark"] .hhb-secondary{background:transparent!important;color:#d0a065;border-color:rgba(228,205,173,.12)!important}
[data-theme="dark"] .hhb-ghost{color:#d0a065;border-color:rgba(228,205,173,.12)!important}
[data-theme="dark"] .hhb-secondary:hover,
[data-theme="dark"] .hhb-ghost:hover,
[data-theme="dark"] .hhb-ghost.active{background:rgba(255,255,255,.03)!important}
[data-theme="dark"] .hero-onboard-code{background:rgba(0,0,0,.2);border-color:rgba(212,165,116,.1);color:#e0cfb0}
[data-theme="dark"] .ho-url{color:#f0c58c}
@media(max-width:860px){
  .home-hero{padding:36px 24px 32px}
  .hero-inner{flex-direction:column;align-items:flex-start;gap:24px;max-width:100%}
  .hero-right{width:100%}
  .home-hero-stats{grid-template-columns:repeat(4,1fr);width:100%;gap:8px}
  .hhs-item{padding:12px 8px}
  .hhs-num{font-size:22px}
  .hero-slogan-main{font-size:36px;white-space:normal;letter-spacing:-.5px}
}
@media(max-width:480px){
  .home-hero{padding:28px 16px 24px}
  .hero-slogan-main{font-size:30px}
  .home-hero-stats{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:640px){
  .header{padding:0 12px;height:48px}
  .header .logo{font-size:18px}
  .logo-img{height:22px}
  .header .subtitle{display:none}
  .header-btn{padding:4px 10px;font-size:11px}
  .header-right{gap:4px;min-width:0}
  .theme-toggle{width:28px;height:28px;font-size:14px}
  .home-hero{padding:20px 14px 22px}
  .hero-inner{flex-direction:column;align-items:stretch;gap:18px;max-width:100%}
  .hero-logo-wrap{width:auto;height:auto;margin:0 0 6px;justify-content:flex-start}
  .hero-main-logo{width:auto;height:72px}
  .hero-left{padding-top:0}
  .hero-right{width:100%}
  .hero-slogan-sub{margin:0 0 14px}
  .hero-slogan-main{font-size:32px;white-space:normal;line-height:1.06}
  .home-hero-btns{gap:8px}
  .home-hero-btns a,.home-hero-btns button{padding:8px 12px;font-size:11px;letter-spacing:.08em}
  .home-hero-stats{width:100%;max-width:100%;grid-template-columns:repeat(2,1fr);gap:8px}
  .hhs-item{padding:14px 10px}
  .hhs-num{font-size:24px}
  .hero-onboard{max-width:100%}
  .hero-onboard-code{display:flex;width:100%;max-width:100%;overflow:hidden}
  .hero-onboard-code>span{min-width:0;flex:1}
  .home-content-wrap{padding:12px 14px 28px;gap:14px;max-width:100%}
  .papers-main,.home-sidebar,.sidebar-section,#masonry{width:100%;max-width:100%;min-width:0}
  .modal-overlay{padding:0}
  .modal{border-radius:0;max-width:100%;min-height:100vh}
  .detail-header{padding:20px 16px 0}
  .detail-header h1{font-size:18px}
  .detail-abstract{margin:0 16px 20px;padding:12px 14px;font-size:13px}
  .detail-core-contribution{margin:0 16px 12px}
  .comments-section{padding:0 16px 24px}
  .radar-section{padding:0 16px}
  .radar-section h2{font-size:16px}
  .meta-review-card{margin:0 16px 16px}
  .about-page{padding:0 14px 40px}
  .about-hero{padding:40px 16px 32px}
  .about-hero h1{font-size:28px}
  .about-hero .hero-tagline{font-size:15px}
  .about-logo-img{height:80px}
  .sidebar-cat-bar{grid-template-columns:repeat(2,1fr)}
}

/* ── Home Content Layout ────────────────────────── */
.home-content-wrap{
  display:flex;align-items:flex-start;gap:20px;
  max-width:1600px;margin:0 auto;padding:16px 48px 40px;
}
.papers-main{flex:1;min-width:0}
.home-sidebar{
  width:clamp(300px, 20vw, 380px);flex-shrink:0;
  align-self:flex-start;
  position:relative;
  padding-bottom:24px;
}
.home-sidebar-inner{
  position:static;
  max-height:none;
  overflow:visible;
  scrollbar-width:thin;scrollbar-color:rgba(212,165,116,.2) transparent;
}
.home-sidebar-inner::-webkit-scrollbar{width:4px}
.home-sidebar-inner::-webkit-scrollbar-thumb{background:rgba(212,165,116,.2);border-radius:4px}
.sidebar-section{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:14px 14px 12px;margin-bottom:12px;
}
.sidebar-section-title{
  font-size:12px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;
}
.sidebar-sort-row{display:flex;align-items:center;gap:6px;margin-bottom:0}
.sidebar-sort-row .sort-pills{flex:1;flex-wrap:wrap;gap:3px}
.sidebar-cat-bar{
  display:grid;grid-template-columns:repeat(3,1fr);gap:4px;
  overflow:visible;padding:0;cursor:default;
}
.sidebar-cat-bar .cat-pill{
  white-space:nowrap;justify-content:center;text-align:center;width:100%;
  min-width:0;overflow:hidden;text-overflow:ellipsis;
}

/* Hot Papers list */
.hot-paper-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer;
  transition:background .15s;
}
.hot-paper-item:last-child{border-bottom:none;padding-bottom:0}
.hot-paper-item:hover .hot-paper-title{color:var(--red)}
.hot-rank{
  flex-shrink:0;width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;color:#fff;margin-top:1px;
  background:var(--muted);
}
.hot-rank.top3{background:linear-gradient(135deg,#d4a574,#b87838)}
.hot-paper-body{flex:1;min-width:0}
.hot-paper-title{
  font-size:12px;font-weight:600;line-height:1.4;color:var(--text);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  transition:color .15s;
}
.hot-paper-meta{font-size:11px;color:var(--muted);margin-top:3px}

[data-theme="dark"] .sidebar-section{background:var(--card);border-color:var(--border)}
[data-theme="dark"] .hot-paper-title{color:var(--text)}
@media(max-width:1000px){
  .home-content-wrap{max-width:96vw;padding:12px 20px 32px;gap:14px}
  .home-sidebar{width:280px}
}
@media(max-width:1280px){
  .home-content-wrap{padding:14px 28px 36px;gap:16px}
  .home-sidebar{width:300px}
  .sidebar-cat-bar{grid-template-columns:repeat(2,minmax(0,1fr))}
  .sidebar-sort-row{align-items:flex-start}
}
@media(max-width:1180px){
  .home-sidebar{width:280px}
  .sidebar-section{padding:13px 12px 11px}
  .sort-pill,.cat-pill{font-size:11px}
  .date-filter{padding:6px 8px}
  .date-filter input[type="date"]{flex-basis:100px}
}
@media(max-width:780px){
  .home-content-wrap{flex-direction:column}
  .home-sidebar{width:100%;position:static;max-height:none}
  .home-sidebar-inner{position:static}
}

/* ── About Page ──────────────────────────────────── */
.about-page{
  --about-ink:#211b17;
  --about-soft:#6d6258;
  --about-line:rgba(86,58,34,.14);
  --about-paper:#faf4ea;
  --about-paper-2:#f4ecdf;
  --about-accent:#9c5a2c;
  --about-accent-soft:#d7a66d;
  max-width:1180px;
  margin:0 auto;
  padding:clamp(20px,3vw,36px) 24px 72px;
  color:var(--about-ink);
}
.about-hero{
  position:relative;
  display:grid;
  grid-template-columns:minmax(0,1.35fr) minmax(280px,.8fr);
  gap:clamp(28px,5vw,72px);
  align-items:start;
  padding:clamp(32px,5vw,64px);
  margin:0 0 clamp(34px,5vw,56px);
  background:
    radial-gradient(circle at top right, rgba(215,166,109,.18), transparent 32%),
    linear-gradient(180deg,rgba(250,244,234,.98),rgba(244,236,223,.92));
  border:1px solid var(--about-line);
  border-radius:36px;
  overflow:hidden;
}
.about-hero::before{
  content:'';
  position:absolute;
  inset:18px;
  border:1px solid rgba(156,90,44,.08);
  border-radius:28px;
  pointer-events:none;
}
.about-hero-main{position:relative;z-index:1}
.about-hero-side{position:relative;z-index:1}
.about-kicker{
  display:inline-flex;
  align-items:center;
  gap:10px;
  margin-bottom:18px;
  font-size:11px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--about-accent);
}
.about-kicker::before{
  content:'';
  width:44px;
  height:1px;
  background:color-mix(in srgb, var(--about-accent) 46%, transparent);
}
.about-logo-block{
  margin:0 auto 18px;
  display:flex;
  justify-content:center;
}
.about-logo-img{
  height:104px;
  width:auto;
  display:block;
  margin:0 auto;
  filter:drop-shadow(0 10px 16px rgba(95,55,26,.08));
}
.about-hero-title{
  margin:0 0 10px;
  max-width:none;
  font-family:'Iowan Old Style','Palatino Linotype','Book Antiqua','Times New Roman',serif;
  font-size:clamp(2.4rem,5.4vw,4.6rem);
  line-height:.92;
  letter-spacing:-.06em;
  color:var(--about-ink);
  white-space:nowrap;
}
.about-hero .hero-tagline{
  font-size:clamp(.88rem,1.15vw,1rem);
  line-height:1.2;
  color:var(--about-accent);
  font-weight:700;
  margin-bottom:22px;
  white-space:nowrap;
  text-align:center;
}
@media(max-width:640px){
  .about-hero .hero-tagline{white-space:normal}
}
.about-hero-copy{
  max-width:36rem;
  font-size:15px;
  line-height:1.9;
  color:var(--about-soft);
}
.about-hero-copy p{margin:0 0 10px}
.about-hero-actions{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
  margin-top:26px;
}
.about-hero .github-btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:12px 18px;
  border-radius:999px;
  border:1px solid rgba(33,27,23,.12);
  background:var(--about-ink);
  color:#f8f1e5;
  font-size:13px;
  font-weight:700;
  text-decoration:none;
  transition:transform .2s,box-shadow .2s,background .2s;
}
.about-hero .github-btn:hover{
  transform:translateY(-1px);
  box-shadow:0 10px 22px rgba(33,27,23,.12);
  background:#17120f;
}
.about-hero .github-btn svg{width:18px;height:18px}
.about-inline-note{
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:rgba(33,27,23,.58);
}
.hero-side-note{
  margin:0 0 18px;
  padding-bottom:16px;
  border-bottom:1px solid var(--about-line);
}
.hero-side-note-label{
  font-size:11px;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--about-accent);
  margin-bottom:12px;
}
.hero-side-note p{
  margin:0;
  font-family:'Iowan Old Style','Palatino Linotype','Book Antiqua','Times New Roman',serif;
  font-size:clamp(1.2rem,2vw,1.55rem);
  line-height:1.45;
  color:var(--about-ink);
}
.about-hero .hero-stats{
  display:grid;
  gap:0;
  margin-top:8px;
  border-top:1px solid var(--about-line);
}
.about-hero .hero-stat{
  display:grid;
  grid-template-columns:minmax(72px,auto) 1fr;
  gap:12px;
  align-items:baseline;
  padding:14px 0;
  border-bottom:1px solid var(--about-line);
}
.about-hero .hero-stat-num{
  font-family:'Iowan Old Style','Palatino Linotype','Book Antiqua','Times New Roman',serif;
  font-size:clamp(1.7rem,3vw,2.5rem);
  line-height:1;
  color:var(--about-ink);
}
.about-hero .hero-stat-label{
  font-size:11px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:rgba(33,27,23,.5);
}
.about-section{
  margin-bottom:clamp(36px,5vw,54px);
}
.about-section-shell{
  display:grid;
  grid-template-columns:minmax(170px,220px) minmax(0,1fr);
  gap:clamp(18px,4vw,36px);
  align-items:start;
}
.about-section-label{
  position:sticky;
  top:84px;
  font-size:11px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--about-accent);
  padding-top:10px;
}
.about-section-body{
  border-top:1px solid var(--about-line);
  padding-top:18px;
}
.about-section-heading{
  margin:0 0 10px;
  font-family:'Iowan Old Style','Palatino Linotype','Book Antiqua','Times New Roman',serif;
  font-size:clamp(1.55rem,2.2vw,2.15rem);
  line-height:1.05;
  letter-spacing:-.04em;
  color:var(--about-ink);
  white-space:nowrap;
}
.about-section-intro{
  max-width:42rem;
  margin:0 0 22px;
  font-size:15px;
  line-height:1.85;
  color:var(--about-soft);
}
.about-section-body h3{
  margin:0 0 12px;
  font-size:13px;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--about-accent);
}
.about-manifesto{
  display:grid;
  grid-template-columns:minmax(0,1.1fr) minmax(240px,.9fr);
  gap:clamp(20px,4vw,34px);
}
.about-manifesto-quote{
  margin:0;
  padding:0 0 0 18px;
  border-left:2px solid rgba(156,90,44,.28);
}
.about-manifesto-quote p{
  margin:0;
  font-family:'Iowan Old Style','Palatino Linotype','Book Antiqua','Times New Roman',serif;
  font-size:clamp(1.5rem,2.6vw,2.15rem);
  line-height:1.22;
  letter-spacing:-.03em;
}
.about-manifesto-copy{
  display:grid;
  gap:12px;
  font-size:14px;
  line-height:1.82;
  color:var(--about-soft);
}
.about-features{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px 28px;
}
.about-feature{
  padding:0 0 18px;
  border-bottom:1px solid rgba(86,58,34,.12);
}
.about-feature h4{
  margin:0 0 8px;
  font-size:14px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--about-ink);
  display:flex;
  align-items:center;
  gap:8px;
}
.about-feature h4 .feat-icon{
  font-size:12px;
  color:var(--about-accent);
}
.about-feature p{
  margin:0;
  font-size:14px;
  line-height:1.82;
  color:var(--about-soft);
}
.about-onboard-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:0;
  align-items:start;
}
.about-steps{
  display:grid;
  gap:20px;
}
.about-step{
  display:grid;
  grid-template-columns:minmax(0,1fr);
  gap:0;
  align-items:start;
  padding-bottom:18px;
  border-bottom:1px solid rgba(86,58,34,.12);
}
.about-step:last-child{border-bottom:none;padding-bottom:0}
.about-step-body h3{
  margin:0 0 6px;
  font-size:18px;
  font-weight:700;
  color:var(--about-ink);
}
.about-step-body p,
.about-step-body li{
  font-size:14px;
  line-height:1.82;
  color:var(--about-soft);
}
.about-step-body ul{
  margin:8px 0 0;
  padding-left:18px;
}
.about-code{
  margin-top:16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  padding:16px 18px;
  border:1px solid rgba(86,58,34,.12);
  border-radius:20px;
  background:linear-gradient(180deg,rgba(250,244,234,.9),rgba(244,236,223,.8));
  font-family:'SF Mono',Consolas,monospace;
  font-size:12.5px;
  line-height:1.5;
  color:#5b4737;
}
.about-code-text{
  min-width:0;
  flex:1;
  white-space:nowrap;
  overflow-x:auto;
  overflow-y:hidden;
  text-overflow:clip;
  scrollbar-width:none;
}
.about-code-text::-webkit-scrollbar{display:none}
.about-code .highlight{
  color:var(--about-accent);
  font-weight:700;
}
.about-code-copy{
  flex-shrink:0;
  border:none;
  border-radius:999px;
  padding:8px 14px;
  background:var(--about-ink);
  color:#f8f1e5;
  font-size:11px;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
  cursor:pointer;
  transition:opacity .2s,transform .2s;
}
.about-code-copy:hover{
  opacity:.9;
  transform:translateY(-1px);
}
.about-side-card{
  padding:22px 22px 24px;
  border:1px solid rgba(86,58,34,.12);
  border-radius:28px;
  background:
    radial-gradient(circle at top, rgba(215,166,109,.12), transparent 38%),
    rgba(250,244,234,.72);
}
.about-side-card h3{
  margin:0 0 10px;
  font-size:13px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--about-accent);
}
.about-side-card p{
  margin:0 0 14px;
  font-size:14px;
  line-height:1.82;
  color:var(--about-soft);
}
.about-side-card ul{
  margin:0;
  padding-left:18px;
}
.about-side-card li{
  margin-bottom:8px;
  font-size:14px;
  line-height:1.72;
  color:var(--about-soft);
}
.about-links-grid{
  display:grid;
  grid-template-columns:minmax(0,1fr) minmax(0,1fr);
  gap:clamp(18px,4vw,30px);
}
.about-link-list,
.about-capability-list{
  list-style:none;
  padding:0;
  margin:0;
  display:grid;
  gap:10px;
}
.about-link-list li,
.about-capability-list li{
  padding:12px 0;
  border-bottom:1px solid rgba(86,58,34,.12);
  font-size:14px;
  line-height:1.72;
  color:var(--about-soft);
}
.about-link-list a{
  color:var(--about-ink);
  text-decoration:none;
  font-weight:700;
}
.about-link-list a:hover{text-decoration:underline}
.about-reader-note{
  margin-top:18px;
  padding-top:18px;
  border-top:1px solid rgba(86,58,34,.12);
  font-size:14px;
  line-height:1.8;
  color:var(--about-soft);
}
.faq-section{padding-bottom:0}
.faq-list{
  display:grid;
  gap:8px;
}
.faq-item{
  border-top:1px solid rgba(86,58,34,.14);
  background:transparent;
}
.faq-item:last-child{border-bottom:1px solid rgba(86,58,34,.14)}
.faq-item summary{
  padding:16px 4px;
  font-size:15px;
  font-weight:700;
  color:var(--about-ink);
  cursor:pointer;
  list-style:none;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.faq-item summary::-webkit-details-marker{display:none}
.faq-item summary::after{
  content:'↗';
  font-size:14px;
  color:rgba(33,27,23,.42);
  transition:transform .2s ease,color .2s ease;
}
.faq-item[open] summary::after{
  transform:rotate(45deg);
  color:var(--about-accent);
}
.faq-item p{
  max-width:44rem;
  padding:0 4px 16px;
  margin:0;
  font-size:14px;
  line-height:1.8;
  color:var(--about-soft);
}
.about-footer{
  display:flex;
  justify-content:space-between;
  gap:20px;
  align-items:flex-end;
  padding-top:24px;
  border-top:1px solid rgba(86,58,34,.14);
}
.about-footer-brand{
  font-size:12px;
  font-weight:700;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:rgba(33,27,23,.58);
  margin-bottom:8px;
}
.about-footer-slogan{
  font-family:'Iowan Old Style','Palatino Linotype','Book Antiqua','Times New Roman',serif;
  font-size:clamp(1.15rem,2vw,1.45rem);
  line-height:1.35;
  color:var(--about-ink);
}
.about-footer-links{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  justify-content:flex-end;
}
.about-footer-links a{
  font-size:12px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--about-accent);
  text-decoration:none;
}
.about-footer-links a:hover{text-decoration:underline}
@media(max-width:900px){
  .about-hero,
  .about-manifesto,
  .about-onboard-grid,
  .about-links-grid,
  .about-section-shell{
    grid-template-columns:1fr;
  }
  .about-section-label{
    position:static;
    padding-top:0;
  }
  .about-section-heading{white-space:normal}
  .about-hero{
    padding:28px 22px 26px;
    border-radius:28px;
  }
  .about-hero-title{max-width:none;white-space:normal}
  .about-footer{
    flex-direction:column;
    align-items:flex-start;
  }
  .about-footer-links{justify-content:flex-start}
}
@media(max-width:640px){
  .about-page{padding:16px 14px 52px}
  .about-logo-img{height:84px}
  .about-features{grid-template-columns:1fr}
  .about-hero .hero-stat{
    grid-template-columns:1fr auto;
    align-items:center;
  }
  .about-step{grid-template-columns:1fr}
}

/* ── About: Join / Contact / Contributors / Thanks ── */
.about-block{margin-bottom:36px}
.about-block-title{font-size:20px;font-weight:800;color:#111;margin:0 0 16px}
.join-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.join-card{
  display:flex;align-items:flex-start;gap:12px;
  background:#f9f9f9;border:1px solid #eee;border-radius:12px;
  padding:14px 16px;cursor:pointer;transition:box-shadow .15s,border-color .15s;
  text-decoration:none;color:inherit;
}
.join-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08);border-color:#ddd}
.join-card-icon{font-size:22px;flex-shrink:0;margin-top:1px}
.join-card-title{font-size:14px;font-weight:700;color:#111;margin-bottom:3px}
.join-card-desc{font-size:12px;color:#888;line-height:1.4}
.contact-row{
